<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>AI学习坐姿监督系统</title>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
      font-family: Arial;
      color: white;
    }

    video {
      position: absolute;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      transform: scaleX(-1);
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }

    /* 状态栏 */
    #status {
      position: absolute;
      top: 15px;
      width: 100%;
      text-align: center;
      font-size: 20px;
      color: #00ffcc;
      font-weight: bold;
    }

    /* 评分 */
    #score {
      position: absolute;
      top: 50px;
      width: 100%;
      text-align: center;
      font-size: 28px;
      color: #ffffff;
      font-weight: bold;
    }

    /* 警告 */
    #warning {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 24px;

      font-size: 40px;
      font-weight: 900;
      color: #ff2b2b;

      background: rgba(0,0,0,0.6);
      border: 2px solid #ff2b2b;
      border-radius: 12px;

      display: none;
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="status">初始化摄像头...</div>
<div id="score">坐姿评分：--</div>
<div id="warning">⚠ 请保持正确坐姿</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const statusEl = document.getElementById("status");
const scoreEl = document.getElementById("score");
const warningEl = document.getElementById("warning");

let badTime = 0;

// =====================
// 摄像头
// =====================
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user" },
      audio: false
    });

    video.srcObject = stream;

    video.onloadedmetadata = () => {
      video.play();
      statusEl.innerText = "摄像头已启动，正在检测坐姿...";
      startAI();
    };

  } catch (e) {
    statusEl.innerText = "摄像头启动失败";
    console.error(e);
  }
}

// =====================
// 姿态 AI
// =====================
function startAI() {

  const pose = new Pose.Pose({
    locateFile: (file) =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
  });

  pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5
  });

  pose.onResults(onResults);

  async function loop() {
    await pose.send({ image: video });
    requestAnimationFrame(loop);
  }

  loop();
}

// =====================
// 坐姿评分逻辑
// =====================
function calcScore(landmarks) {

  const nose = landmarks[0];
  const ls = landmarks[11];
  const rs = landmarks[12];
  const lh = landmarks[23];
  const rh = landmarks[24];

  if (!nose || !ls || !rs || !lh || !rh) return 100;

  const shoulderX = (ls.x + rs.x) / 2;
  const shoulderY = (ls.y + rs.y) / 2;
  const hipY = (lh.y + rh.y) / 2;

  let score = 100;

  // 1️⃣ 低头 / 前倾
  if (nose.y > shoulderY + 0.1) score -= 30;

  // 2️⃣ 驼背
  if (Math.abs(nose.x - shoulderX) > 0.08) score -= 25;

  // 3️⃣ 趴桌（头太低）
  if (nose.y > hipY - 0.05) score -= 25;

  return Math.max(0, score);
}

// =====================
// 语音提醒
// =====================
function speak(text) {
  const msg = new SpeechSynthesisUtterance(text);
  msg.lang = "zh-CN";
  msg.rate = 1;
  speechSynthesis.speak(msg);
}

// =====================
// 结果处理
// =====================
function onResults(results) {

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!results.poseLandmarks) return;

  drawConnectors(ctx, results.poseLandmarks, Pose.POSE_CONNECTIONS);
  drawLandmarks(ctx, results.poseLandmarks);

  const score = calcScore(results.poseLandmarks);

  scoreEl.innerText = `坐姿评分：${score}`;

  // =====================
  // 状态判断
  // =====================
  if (score < 60) {

    warningEl.style.display = "block";

    badTime++;

    // 每3秒提醒一次
    if (badTime % 90 === 0) {
      speak("请注意坐姿，坐直一点");
    }

  } else {
    warningEl.style.display = "none";
    badTime = 0;
  }

  if (score > 85) {
    statusEl.innerText = "状态：优秀 👍";
  } else if (score > 60) {
    statusEl.innerText = "状态：一般";
  } else {
    statusEl.innerText = "状态：需要调整 ⚠";
  }
}

// =====================
startCamera();

</script>

</body>
</html>
