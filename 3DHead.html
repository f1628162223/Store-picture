<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>坐姿检测系统</title>

<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: Arial;
  }

  video {
    position: absolute;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    transform: scaleX(-1);
  }

  canvas {
    position: absolute;
    top: 0;
    left: 0;
  }

  #score {
    position: absolute;
    top: 5vh;
    width: 100%;
    text-align: center;
    font-size: 10vh;
    font-weight: 900;
    color: white;
  }

  #warning {
    position: absolute;
    bottom: 10vh;
    left: 50%;
    transform: translateX(-50%);
    font-size: 5.5vh;
    font-weight: 900;
    color: red;
    background: rgba(0,0,0,0.7);
    border: 3px solid red;
    border-radius: 12px;
    padding: 2vh 4vh;
    display: none;
    text-align: center;
  }
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="score">100</div>
<div id="warning"></div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");
const warningEl = document.getElementById("warning");

let pose;
let scoreBuffer = [];
let badFrames = 0;

// =========================
// 摄像头
// =========================
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user" },
    audio: false
  });

  video.srcObject = stream;

  await new Promise(r => video.onloadedmetadata = r);
  await video.play();
}

// =========================
// 镜像
// =========================
function mirror(lm) {
  return lm.map(p => ({
    ...p,
    x: 1 - p.x
  }));
}

// =========================
// ⭐ 更真实评分系统
// =========================
function calcScore(lm) {

  const nose = lm[0];
  const ls = lm[11];
  const rs = lm[12];
  const lh = lm[23];
  const rh = lm[24];

  if (!nose || !ls || !rs || !lh || !rh) return 100;

  const shoulderX = (ls.x + rs.x) / 2;
  const shoulderY = (ls.y + rs.y) / 2;
  const hipY = (lh.y + rh.y) / 2;

  let score = 100;

  // =====================
  // 🟡 允许轻微低头（写作业正常）
  // =====================
  const headDrop = nose.y - shoulderY;
  if (headDrop > 0.28) score -= 15;

  // =====================
  // 🔴 前倾（核心判断）
  // =====================
  const bodyLean =
    Math.abs(nose.x - shoulderX) /
    Math.max(0.01, Math.abs(rs.x - ls.x));

  if (bodyLean > 0.30) score -= 35;

  // =====================
  // 🔴 趴桌（强判断）
  // =====================
  if (nose.y > hipY - 0.10) score -= 50;

  return Math.max(0, score);
}

// =========================
// ⭐ 防“全程100”的关键修复
// =========================
function smoothScore(newScore) {

  scoreBuffer.push(newScore);

  if (scoreBuffer.length > 6) {
    scoreBuffer.shift();
  }

  const avg =
    scoreBuffer.reduce((a, b) => a + b, 0) / scoreBuffer.length;

  const min = Math.min(...scoreBuffer);

  // 👉 保留异常影响
  return Math.round(avg * 0.6 + min * 0.4);
}

// =========================
// 初始化
// =========================
function initPose() {

  pose = new Pose({
    locateFile: (file) =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
  });

  pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true,
    minDetectionConfidence: 0.4,
    minTrackingConfidence: 0.4
  });

  pose.onResults(onResults);

  loop();
}

// =========================
// 循环
// =========================
async function loop() {
  await pose.send({ image: video });
  requestAnimationFrame(loop);
}

// =========================
// 结果
// =========================
function onResults(results) {

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!results.poseLandmarks) return;

  const lm = mirror(results.poseLandmarks);

  drawConnectors(ctx, lm, Pose.POSE_CONNECTIONS);
  drawLandmarks(ctx, lm);

  const rawScore = calcScore(lm);
  const score = smoothScore(rawScore);

  scoreEl.innerText = score;

  // =========================
  // 🔥 关键：更容易触发报警
  // =========================
  if (rawScore < 60) {
    badFrames += 2;
  } else {
    badFrames = Math.max(0, badFrames - 1);
  }

  if (badFrames > 4) {
    warningEl.style.display = "block";

    if (rawScore < 40) {
      warningEl.innerText = "⚠ 趴桌姿势";
    } else {
      warningEl.innerText = "⚠ 坐姿不端正（请挺直身体）";
    }

  } else {
    warningEl.style.display = "none";
  }
}

// =========================
// 启动
// =========================
async function start() {
  await startCamera();
  initPose();
}

start();

</script>

</body>
</html>
