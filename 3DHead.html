<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>3D卡通头姿态跟随</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
  }

  video {
    position: absolute;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    transform: scaleX(-1);
  }

  canvas {
    position: absolute;
    top: 0;
    left: 0;
  }

  #status {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 20px;
    z-index: 10;
  }
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<div id="status">加载中...</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<!-- Three.js -->
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

const video = document.getElementById("video");
const statusEl = document.getElementById("status");

let pose;

// ==========================
// Three.js 3D场景
// ==========================
let scene, camera, renderer, head;

function init3D() {

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.domElement.style.position = "absolute";
  document.body.appendChild(renderer.domElement);

  // 光源
  const light1 = new THREE.DirectionalLight(0xffffff, 1);
  light1.position.set(1, 1, 1);
  scene.add(light1);

  const light2 = new THREE.AmbientLight(0xffffff, 0.5);
  scene.add(light2);

  // ==========================
  // 简单“动物头”（球体代替）
  // ==========================
  const geometry = new THREE.SphereGeometry(1, 32, 32);
  const material = new THREE.MeshStandardMaterial({
    color: 0xffcc66,
    roughness: 0.4,
    metalness: 0.1
  });

  head = new THREE.Mesh(geometry, material);
  scene.add(head);

  camera.position.z = 4;

  animate();
}

function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}

// ==========================
// 非线性放大（手感优化）
// ==========================
function amplify(x) {
  return Math.sign(x) * Math.pow(Math.abs(x), 1.4);
}

// ==========================
// 姿态计算（关键）
// ==========================
function getAngles(lm) {

  const nose = lm[0];
  const ls = lm[11];
  const rs = lm[12];

  const midY = (ls.y + rs.y) / 2;

  let pitch = amplify(nose.y - midY) * 6;   // 低头
  let roll  = amplify(rs.y - ls.y) * 6;     // 歪头
  let yaw   = amplify(0.5 - nose.x) * 6;    // 左右

  // 死区（防抖）
  if (Math.abs(pitch) < 0.02) pitch = 0;
  if (Math.abs(roll) < 0.02) roll = 0;
  if (Math.abs(yaw) < 0.02) yaw = 0;

  return { pitch, yaw, roll };
}

// ==========================
// 驱动3D头
// ==========================
function updateHead({pitch, yaw, roll}) {

  // 限制最大角度
  const limit = 1.2;

  pitch = Math.max(-limit, Math.min(limit, pitch));
  yaw   = Math.max(-limit, Math.min(limit, yaw));
  roll  = Math.max(-limit, Math.min(limit, roll));

  // THREE.js 坐标系
  head.rotation.x = -pitch; // 低头
  head.rotation.y = yaw;    // 左右转
  head.rotation.z = roll;   // 歪头

  // 状态
  if (Math.abs(pitch) > 0.6) {
    statusEl.innerText = "⚠ 低头过多";
  } else if (Math.abs(roll) > 0.6) {
    statusEl.innerText = "⚠ 头部歪斜";
  } else {
    statusEl.innerText = "✔ 姿势良好";
  }
}

// ==========================
// 摄像头
// ==========================
async function startCamera() {

  const stream = await navigator.mediaDevices.getUserMedia({
    video: true
  });

  video.srcObject = stream;

  await new Promise(r => video.onloadedmetadata = r);
  await video.play();
}

// ==========================
// MediaPipe初始化
// ==========================
function initPose() {

  pose = new Pose({
    locateFile: f =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`
  });

  pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true
  });

  pose.onResults(res => {

    if (!res.poseLandmarks) return;

    const lm = res.poseLandmarks;

    const angles = getAngles(lm);

    updateHead(angles);
  });

  loop();
}

// ==========================
// 循环
// ==========================
async function loop() {
  await pose.send({ image: video });
  requestAnimationFrame(loop);
}

// ==========================
// 启动
// ==========================
(async () => {
  await startCamera();
  init3D();
  initPose();
})();

</script>

</body>
</html>
