<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>工业级坐姿检测系统</title>

<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: Arial;
    color: white;
  }

  /* 视频镜像 */
  video {
    position: absolute;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    transform: scaleX(-1);
  }

  canvas {
    position: absolute;
    top: 0;
    left: 0;
  }

  #status {
    position: absolute;
    top: 2vh;
    width: 100%;
    text-align: center;
    font-size: 4vh;
    font-weight: bold;
    color: #00ffcc;
  }

  #score {
    position: absolute;
    top: 10vh;
    width: 100%;
    text-align: center;
    font-size: 7vh;
    font-weight: 900;
    color: white;
  }

  #warning {
    position: absolute;
    bottom: 10vh;
    left: 50%;
    transform: translateX(-50%);
    font-size: 6vh;
    padding: 2vh 4vh;
    background: rgba(0,0,0,0.6);
    border: 3px solid red;
    border-radius: 12px;
    color: red;
    display: none;
  }
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="status">启动摄像头...</div>
<div id="score">--</div>
<div id="warning">⚠ 坐姿不正确</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const statusEl = document.getElementById("status");
const scoreEl = document.getElementById("score");
const warningEl = document.getElementById("warning");

let pose;
let running = false;

// =========================
// 摄像头
// =========================
async function startCamera() {

  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user" },
    audio: false
  });

  video.srcObject = stream;

  return new Promise(resolve => {
    video.onloadedmetadata = () => {
      video.play();
      resolve();
    };
  });
}

// =========================
// 镜像修复（关键）
// =========================
function mirror(landmarks) {
  return landmarks.map(p => ({
    ...p,
    x: 1 - p.x   // 🔥 关键：左右翻转同步
  }));
}

// =========================
// 初始化 AI
// =========================
function initPose() {

  pose = new Pose({
    locateFile: (file) =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
  });

  pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5
  });

  pose.onResults(onResults);

  running = true;
  loop();
}

// =========================
// 稳定循环（工业级）
// =========================
async function loop() {
  if (!running) return;

  try {
    await pose.send({ image: video });
  } catch (e) {
    console.log("pose error", e);
  }

  setTimeout(loop, 33); // 30fps稳定
}

// =========================
// 评分系统
// =========================
function getScore(lm) {

  const nose = lm[0];
  const ls = lm[11];
  const rs = lm[12];
  const lh = lm[23];
  const rh = lm[24];

  if (!nose || !ls || !rs || !lh || !rh) return 100;

  const shoulderX = (ls.x + rs.x) / 2;
  const shoulderY = (ls.y + rs.y) / 2;
  const hipY = (lh.y + rh.y) / 2;

  let score = 100;

  // 低头
  if (nose.y > shoulderY + 0.12) score -= 35;

  // 左右歪头
  if (Math.abs(nose.x - shoulderX) > 0.1) score -= 25;

  // 趴桌
  if (nose.y > hipY - 0.05) score -= 30;

  return Math.max(0, score);
}

// =========================
// 核心渲染（对齐修复）
// =========================
function onResults(results) {

  // ✔ 每帧同步尺寸（防止偏移）
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!results.poseLandmarks) return;

  // 🔥 镜像修复（关键）
  const lm = mirror(results.poseLandmarks);

  // 画骨架
  drawConnectors(ctx, lm, Pose.POSE_CONNECTIONS);
  drawLandmarks(ctx, lm);

  const score = getScore(lm);

  scoreEl.innerText = score;

  if (score < 60) {
    warningEl.style.display = "block";
  } else {
    warningEl.style.display = "none";
  }

  statusEl.innerText = "运行中";
}

// =========================
// 启动
// =========================
async function start() {

  statusEl.innerText = "请求摄像头...";

  await startCamera();

  statusEl.innerText = "加载模型...";

  initPose();

  statusEl.innerText = "";
}

start();

</script>

</body>
</html>
