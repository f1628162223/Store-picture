<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>3D调试版</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #222; /* ⭐ 用灰色防黑屏误判 */
  }

  #status {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 18px;
    z-index: 10;
  }
</style>
</head>

<body>

<div id="status">启动中...</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/loaders/GLTFLoader.js"></script>

<script>

const statusEl = document.getElementById("status");

let scene, camera, renderer, model;

init();

function init() {

  console.log("init start");

  // =====================
  // Scene
  // =====================
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  camera.position.set(0, 0, 3);

  // =====================
  // Renderer
  // =====================
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  console.log("renderer OK");

  // =====================
  // ⭐ TEST BOX（关键调试）
  // =====================
  const testGeo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
  const testMat = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
  const cube = new THREE.Mesh(testGeo, testMat);
  scene.add(cube);

  console.log("test cube added");

  // =====================
  // LIGHT
  // =====================
  const light = new THREE.DirectionalLight(0xffffff, 2);
  light.position.set(1, 1, 1);
  scene.add(light);

  scene.add(new THREE.AmbientLight(0xffffff, 1.5));

  // =====================
  // LOAD MODEL
  // =====================
  const loader = new THREE.GLTFLoader();

  console.log("loading glb...");

  loader.load(
    "./puppycat_head.glb",

    (gltf) => {

      console.log("GLB loaded");

      model = gltf.scene;
      scene.add(model);

      // ===== 强制可见修复 =====
      const box = new THREE.Box3().setFromObject(model);
      const size = box.getSize(new THREE.Vector3()).length();
      const center = box.getCenter(new THREE.Vector3());

      model.position.sub(center);

      const scale = 1.5 / size;
      model.scale.setScalar(scale);

      model.position.z = 0;

      // ⭐ 强制移到摄像机前
      model.position.y = 0;

      statusEl.innerText = "✔ 模型加载成功";
    },

    (xhr) => {
      statusEl.innerText =
        "加载中 " + Math.round(xhr.loaded / xhr.total * 100) + "%";
    },

    (err) => {
      console.error("GLB ERROR:", err);
      statusEl.innerText = "❌ 模型加载失败（看控制台）";
    }
  );

  animate();
}

// =====================
// render loop
// =====================
function animate() {

  requestAnimationFrame(animate);

  // ⭐ 让你确定Three在动
  scene.rotation.y += 0.002;

  renderer.render(scene, camera);
}

</script>

</body>
</html>
