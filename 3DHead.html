<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>3D模型展示（自动适配）</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #111;
  }

  #status {
    position: absolute;
    top: 20px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 18px;
  }
</style>
</head>

<body>

<div id="status">加载模型中...</div>

<script type="module">

import * as THREE from 'https://esm.sh/three@0.158.0';
import { GLTFLoader } from 'https://esm.sh/three@0.158.0/examples/jsm/loaders/GLTFLoader.js';

const statusEl = document.getElementById("status");

let scene, camera, renderer, model;

init();

function init() {

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  camera.position.set(0, 0, 2); // 👈 更近一点

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // 光照（增强亮度）
  const light1 = new THREE.DirectionalLight(0xffffff, 1);
  light1.position.set(1, 1, 1);
  scene.add(light1);

  const light2 = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
  scene.add(light2);

  // ===== 加载模型 =====
  const loader = new GLTFLoader();

  loader.load(
    './puppycat_head.glb',

    (gltf) => {

      model = gltf.scene;
      scene.add(model);

      // =========================
      // ⭐ 自动居中 + 自动缩放（核心）
      // =========================
      const box = new THREE.Box3().setFromObject(model);
      const size = box.getSize(new THREE.Vector3()).length();
      const center = box.getCenter(new THREE.Vector3());

      // 居中
      model.position.sub(center);

      // 自动缩放（关键）
      const scale = 2 / size;
      model.scale.setScalar(scale);

      statusEl.innerText = "✔ 加载成功";

      console.log("模型尺寸:", size);
    },

    (xhr) => {
      statusEl.innerText = "加载中 " + Math.round(xhr.loaded / xhr.total * 100) + "%";
    },

    (err) => {
      console.error(err);
      statusEl.innerText = "❌ 加载失败";
    }
  );

  animate();
}

// ===== 渲染 =====
function animate() {
  requestAnimationFrame(animate);

  if (model) {
    model.rotation.y += 0.01; // 自动旋转（方便观察）
  }

  renderer.render(scene, camera);
}

// ===== 自适应 =====
window.addEventListener("resize", () => {

  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();

  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
