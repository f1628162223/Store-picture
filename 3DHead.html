<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>坐姿检测系统</title>

<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: Arial;
    color: white;
  }

  video {
    position: absolute;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    transform: scaleX(-1);
  }

  canvas {
    position: absolute;
    top: 0;
    left: 0;
  }

  /* 状态 */
  #status {
    position: absolute;
    top: 2vh;
    width: 100%;
    text-align: center;
    font-size: 5vh;
    font-weight: bold;
    color: #00ffcc;
  }

  /* 分数 */
  #score {
    position: absolute;
    top: 10vh;
    width: 100%;
    text-align: center;
    font-size: 7vh;
    font-weight: 900;
    color: white;
  }

  /* 警告 */
  #warning {
    position: absolute;
    bottom: 10vh;
    left: 50%;
    transform: translateX(-50%);
    font-size: 6vh;
    padding: 2vh 4vh;
    background: rgba(0,0,0,0.6);
    border: 3px solid red;
    border-radius: 12px;
    color: red;
    display: none;
  }
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="status">启动中...</div>
<div id="score">--</div>
<div id="warning">⚠ 坐姿不正确</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const statusEl = document.getElementById("status");
const scoreEl = document.getElementById("score");
const warningEl = document.getElementById("warning");

let pose;
let running = false;

// =====================
// 摄像头
// =====================
async function startCamera() {

  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user" },
    audio: false
  });

  video.srcObject = stream;

  return new Promise(resolve => {
    video.onloadedmetadata = () => {
      video.play();
      resolve();
    };
  });
}

// =====================
// AI 初始化（无UI文字）
// =====================
function initPose() {

  pose = new Pose({
    locateFile: (file) =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
  });

  pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5
  });

  pose.onResults(onResults);

  running = true;
  loop();
}

// =====================
// 循环
// =====================
async function loop() {
  if (!running) return;

  await pose.send({ image: video });

  setTimeout(loop, 33);
}

// =====================
// 评分逻辑
// =====================
function getScore(lm) {

  const nose = lm[0];
  const ls = lm[11];
  const rs = lm[12];
  const lh = lm[23];
  const rh = lm[24];

  if (!nose || !ls || !rs || !lh || !rh) return 100;

  const shoulderX = (ls.x + rs.x) / 2;
  const shoulderY = (ls.y + rs.y) / 2;

  let score = 100;

  if (nose.y > shoulderY + 0.12) score -= 30;
  if (Math.abs(nose.x - shoulderX) > 0.1) score -= 25;

  return Math.max(0, score);
}

// =====================
// 结果
// =====================
function onResults(results) {

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!results.poseLandmarks) return;

  drawConnectors(ctx, results.poseLandmarks, Pose.POSE_CONNECTIONS);
  drawLandmarks(ctx, results.poseLandmarks);

  const score = getScore(results.poseLandmarks);

  scoreEl.innerText = score;

  if (score < 60) {
    warningEl.style.display = "block";
  } else {
    warningEl.style.display = "none";
  }

  statusEl.innerText = "运行中";
}

// =====================
// 启动
// =====================
async function start() {

  statusEl.innerText = "启动摄像头...";

  await startCamera();

  initPose();

  statusEl.innerText = "";
}

start();

</script>

</body>
</html>
