<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>3D坐姿检测（修复版）</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
  }

  video {
    position: absolute;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    transform: scaleX(-1);
  }

  #status {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 20px;
    z-index: 10;
  }
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<div id="status">加载中...</div>

<!-- ===================== -->
<!-- MediaPipe（必须 script） -->
<!-- ===================== -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>

<!-- Three.js -->
<script type="module">

import * as THREE from 'https://esm.sh/three@0.158.0';
import { GLTFLoader } from 'https://esm.sh/three@0.158.0/examples/jsm/loaders/GLTFLoader.js';

const video = document.getElementById("video");
const statusEl = document.getElementById("status");

let scene, camera, renderer, model;
let pose;

// =====================
// 摄像头
// =====================
async function startCamera() {

  const stream = await navigator.mediaDevices.getUserMedia({
    video: true
  });

  video.srcObject = stream;

  await new Promise(r => video.onloadedmetadata = r);
  await video.play();
}

// =====================
// 3D初始化
// =====================
function init3D() {

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  camera.position.set(0, 0, 2);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // 光
  scene.add(new THREE.DirectionalLight(0xffffff, 1));
  scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.2));

  // 模型
  const loader = new GLTFLoader();

  loader.load('./puppycat_head.glb', (gltf) => {

    model = gltf.scene;
    scene.add(model);

    // 自动居中 + 缩放
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3()).length();
    const center = box.getCenter(new THREE.Vector3());

    model.position.sub(center);
    model.scale.setScalar(2 / size);

    statusEl.innerText = "✔ 模型加载成功";
  });

  animate();
}

// =====================
// 姿态计算
// =====================
function getAngles(lm) {

  const nose = lm[0];
  const ls = lm[11];
  const rs = lm[12];

  const midY = (ls.y + rs.y) / 2;

  return {
    pitch: (nose.y - midY) * 6,
    roll: (rs.y - ls.y) * 6,
    yaw: (0.5 - nose.x) * 6
  };
}

// =====================
// 驱动模型
// =====================
function updateModel({ pitch, roll, yaw }) {

  if (!model) return;

  const limit = 1.2;

  pitch = Math.max(-limit, Math.min(limit, pitch));
  roll  = Math.max(-limit, Math.min(limit, roll));
  yaw   = Math.max(-limit, Math.min(limit, yaw));

  model.rotation.x = -pitch;
  model.rotation.y = yaw;
  model.rotation.z = roll;

  if (Math.abs(pitch) > 0.6) {
    statusEl.innerText = "⚠ 低头过多";
  } else if (Math.abs(roll) > 0.6) {
    statusEl.innerText = "⚠ 歪头";
  } else {
    statusEl.innerText = "✔ 姿势良好";
  }
}

// =====================
// MediaPipe初始化（关键修复）
// =====================
function initPose() {

  // ✔ 关键：来自 window.Pose
  pose = new window.Pose({
    locateFile: (file) =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
  });

  pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true
  });

  pose.onResults(res => {

    if (!res.poseLandmarks) return;

    const angles = getAngles(res.poseLandmarks);

    updateModel(angles);
  });

  loop();
}

async function loop() {
  await pose.send({ image: video });
  requestAnimationFrame(loop);
}

// =====================
// 渲染
// =====================
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}

// =====================
// 启动
// =====================
(async () => {

  await startCamera();

  init3D();
  initPose();

})();

</script>

</body>
</html>
