<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Head Face Tracking</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
        }

        #canvas {
            width: 100%;
            height: 100%;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #video {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 200px;
            height: 150px;
            background: black;
            border: 3px solid white;
            border-radius: 10px;
            z-index: 100;
            opacity: 0.8;
        }

        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            font-size: 12px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            z-index: 101;
        }

        #info p {
            margin: 5px 0;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 40px;
            border-radius: 15px;
            font-size: 16px;
            z-index: 1000;
            text-align: center;
            font-family: monospace;
        }

        #loading p {
            margin: 10px 0;
            font-size: 14px;
        }

        .loading-step {
            color: #aaa;
            font-size: 12px;
            margin-top: 15px;
            line-height: 1.6;
        }

        .loading-step.active {
            color: #4CAF50;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="canvas"></canvas>
        <video id="video" playsinline muted autoplay></video>
        <div id="info">
            <p><strong>Face Tracking</strong></p>
            <p>Yaw: <span id="yaw">0</span>°</p>
            <p>Pitch: <span id="pitch">0</span>°</p>
            <p>Roll: <span id="roll">0</span>°</p>
            <p>FPS: <span id="fps">0</span></p>
        </div>
        <div id="loading">
            <p>正在初始化...</p>
            <div class="loading-step" id="step1">⏳ 加载 Three.js</div>
            <div class="loading-step" id="step2">⏳ 加载 MediaPipe</div>
            <div class="loading-step" id="step3">⏳ 请求摄像头权限</div>
            <div class="loading-step" id="step4">⏳ 初始化完成</div>
            <p id="error" style="color: #ff6b6b; margin-top: 15px; display: none;"></p>
        </div>
    </div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- MediaPipe -->
    <script src="https://unpkg.com/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://unpkg.com/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://unpkg.com/@mediapipe/face_mesh/face_mesh.js"></script>

    <script>
        // ============= LOADING STATUS =============
        function setLoadingStep(stepId, isComplete = false) {
            const step = document.getElementById(stepId);
            if (step) {
                if (isComplete) {
                    step.classList.add('active');
                    step.textContent = '✓ ' + step.textContent.substring(2);
                } else {
                    step.classList.add('active');
                }
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            if (errorDiv) {
                errorDiv.textContent = '❌ ' + message;
                errorDiv.style.display = 'block';
            }
            console.error(message);
        }

        // Check if Three.js loaded
        if (typeof THREE === 'undefined') {
            showError('Three.js 加载失败');
        } else {
            setLoadingStep('step1', true);
        }

        // Wait for MediaPipe to load
        let mediapipeReady = false;
        const mediapipeCheckInterval = setInterval(() => {
            if (typeof FaceMesh !== 'undefined' && typeof Camera !== 'undefined') {
                clearInterval(mediapipeCheckInterval);
                mediapipeReady = true;
                setLoadingStep('step2', true);
                initializeApp();
            }
        }, 100);

        // Timeout for MediaPipe loading
        setTimeout(() => {
            if (!mediapipeReady) {
                clearInterval(mediapipeCheckInterval);
                showError('MediaPipe 库加载超时。请检查网络连接或尝试刷新页面。');
            }
        }, 15000);

        async function initializeApp() {
            try {
                // ============= THREE.JS SETUP =============
                const canvas = document.getElementById('canvas');
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false, premultipliedAlpha: false });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(window.devicePixelRatio);
                renderer.setClearColor(0x0a0e27, 1);
                renderer.shadowMap.enabled = true;

                camera.position.z = 5;

                // ============= LIGHTING =============
                const ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
                scene.add(ambientLight);

                const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
                directionalLight.position.set(10, 10, 10);
                directionalLight.castShadow = true;
                directionalLight.shadow.mapSize.width = 2048;
                directionalLight.shadow.mapSize.height = 2048;
                scene.add(directionalLight);

                // ============= CREATE CARTOON HEAD MODEL =============
                const headGroup = new THREE.Group();
                scene.add(headGroup);

                function createCartoonHead() {
                    const head = new THREE.Group();

                    // Main head (face)
                    const faceGeometry = new THREE.SphereGeometry(1, 32, 32);
                    const faceMaterial = new THREE.MeshPhongMaterial({
                        color: 0xfdbf6f,
                        shininess: 30,
                        emissive: 0x331111
                    });
                    const faceMesh = new THREE.Mesh(faceGeometry, faceMaterial);
                    faceMesh.scale.set(1, 1.1, 0.9);
                    faceMesh.castShadow = true;
                    faceMesh.receiveShadow = true;
                    head.add(faceMesh);

                    // Left eye
                    const eyeGeometry = new THREE.SphereGeometry(0.25, 16, 16);
                    const eyeMaterial = new THREE.MeshPhongMaterial({ color: 0xffffff });
                    const leftEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
                    leftEye.position.set(-0.4, 0.4, 1);
                    leftEye.castShadow = true;
                    head.add(leftEye);

                    // Right eye
                    const rightEye = leftEye.clone();
                    rightEye.position.x = 0.4;
                    head.add(rightEye);

                    // Left pupil
                    const pupilGeometry = new THREE.SphereGeometry(0.12, 16, 16);
                    const pupilMaterial = new THREE.MeshPhongMaterial({ color: 0x000000 });
                    const leftPupil = new THREE.Mesh(pupilGeometry, pupilMaterial);
                    leftPupil.position.set(-0.4, 0.4, 1.2);
                    head.add(leftPupil);

                    // Right pupil
                    const rightPupil = leftPupil.clone();
                    rightPupil.position.x = 0.4;
                    head.add(rightPupil);

                    // Snout/Nose
                    const snoutGeometry = new THREE.SphereGeometry(0.3, 16, 16);
                    const snoutMaterial = new THREE.MeshPhongMaterial({ color: 0xf4a460 });
                    const snout = new THREE.Mesh(snoutGeometry, snoutMaterial);
                    snout.position.set(0, -0.2, 1);
                    snout.scale.set(1, 0.8, 0.7);
                    snout.castShadow = true;
                    head.add(snout);

                    // Nose tip
                    const noseTipGeometry = new THREE.SphereGeometry(0.1, 16, 16);
                    const noseTipMaterial = new THREE.MeshPhongMaterial({ color: 0xff69b4 });
                    const noseTip = new THREE.Mesh(noseTipGeometry, noseTipMaterial);
                    noseTip.position.set(0, -0.3, 1.3);
                    noseTip.castShadow = true;
                    head.add(noseTip);

                    // Left ear
                    const earGeometry = new THREE.SphereGeometry(0.35, 16, 16);
                    const earMaterial = new THREE.MeshPhongMaterial({ color: 0xfdbf6f });
                    const leftEar = new THREE.Mesh(earGeometry, earMaterial);
                    leftEar.position.set(-1.1, 0.6, 0);
                    leftEar.scale.set(0.8, 1.2, 0.6);
                    leftEar.castShadow = true;
                    head.add(leftEar);

                    // Right ear
                    const rightEar = leftEar.clone();
                    rightEar.position.x = 1.1;
                    head.add(rightEar);

                    // Left ear inner
                    const earInnerGeometry = new THREE.SphereGeometry(0.15, 12, 12);
                    const earInnerMaterial = new THREE.MeshPhongMaterial({ color: 0xffb6c1 });
                    const leftEarInner = new THREE.Mesh(earInnerGeometry, earInnerMaterial);
                    leftEarInner.position.set(-1.1, 0.6, 0.3);
                    head.add(leftEarInner);

                    const rightEarInner = leftEarInner.clone();
                    rightEarInner.position.x = 1.1;
                    head.add(rightEarInner);

                    // Mouth
                    const mouthGeometry = new THREE.BoxGeometry(0.6, 0.15, 0.1);
                    const mouthMaterial = new THREE.MeshPhongMaterial({ color: 0x000000 });
                    const mouth = new THREE.Mesh(mouthGeometry, mouthMaterial);
                    mouth.position.set(0, -0.7, 0.9);
                    mouth.castShadow = true;
                    head.add(mouth);

                    return head;
                }

                const cartoonHead = createCartoonHead();
                headGroup.add(cartoonHead);

                // 添加一个坐标系帮助器用于调试
                const axesHelper = new THREE.AxesHelper(2);
                scene.add(axesHelper);

                console.log('✓ 卡通头部已创建，坐标系已显示');
                console.log('Three.js 场景:', { 
                    canvas, 
                    scene, 
                    renderer, 
                    camera,
                    headGroup,
                    animationStarted: false
                });

                // ============= SMOOTHING VARIABLES =============
                const smoothing = {
                    yaw: 0,
                    pitch: 0,
                    roll: 0,
                    targetYaw: 0,
                    targetPitch: 0,
                    targetRoll: 0
                };

                const lerpFactor = 0.1; // Smooth transition factor (0-1)

                // ============= FACE TRACKING SETUP =============
                const video = document.getElementById('video');
                const loadingDiv = document.getElementById('loading');

                setLoadingStep('step3');

                let faceDetected = false;
                let frameProcessed = 0;

                // 创建和配置 FaceMesh
                const faceMesh = new FaceMesh({
                    lockedVideoProperties: {
                        width: 1280,
                        height: 720
                    }
                });

                console.log('📊 FaceMesh 实例已创建');

                faceMesh.setOptions({
                    maxNumFaces: 1,
                    refineLandmarks: true,
                    minDetectionConfidence: 0.5,
                    minTrackingConfidence: 0.5
                });

                console.log('⚙️ FaceMesh 选项已设置');

                // 定义面部检测回调函数
                function onResults(results) {
                    frameProcessed++;
                    
                    if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) {
                        if (frameProcessed % 30 === 0) {
                            console.log('⚠️ 未检测到人脸，请确保你在摄像头前面');
                        }
                        faceDetected = false;
                        return;
                    }

                    if (!faceDetected) {
                        console.log('✅ 首次检测到人脸！开始跟踪...');
                    }
                    faceDetected = true;
                    const landmarks = results.multiFaceLandmarks[0];

                    // Key landmark indices for head pose estimation
                    const noseTip = landmarks[1];      // Tip of nose (front center)
                    const foreheadMid = landmarks[10]; // Forehead
                    const leftCheek = landmarks[234];  // Left cheek
                    const rightCheek = landmarks[454]; // Right cheek
                    const leftEar = landmarks[133];    // Left ear
                    const rightEar = landmarks[362];   // Right ear

                    // Calculate head rotation angles from landmarks
                    // YAW (left-right rotation)
                    const cheekDiff = rightCheek.x - leftCheek.x;
                    smoothing.targetYaw = (cheekDiff - 0.5) * 120;

                    // PITCH (up-down rotation)
                    const verticalDiff = noseTip.y - foreheadMid.y;
                    smoothing.targetPitch = verticalDiff * -200;

                    // ROLL (head tilt)
                    const earDiff = rightEar.y - leftEar.y;
                    smoothing.targetRoll = earDiff * 150;

                    // Clamp values
                    smoothing.targetYaw = Math.max(-45, Math.min(45, smoothing.targetYaw));
                    smoothing.targetPitch = Math.max(-40, Math.min(40, smoothing.targetPitch));
                    smoothing.targetRoll = Math.max(-30, Math.min(30, smoothing.targetRoll));

                    // 调试日志（每秒一次）
                    if (frameProcessed % 30 === 0) {
                        console.log(`📍 Yaw: ${smoothing.targetYaw.toFixed(1)}° | Pitch: ${smoothing.targetPitch.toFixed(1)}° | Roll: ${smoothing.targetRoll.toFixed(1)}°`);
                    }
                }

                // 设置回调函数
                faceMesh.onResults(onResults);
                console.log('🔗 face mesh 回调已注册');

                // 创建 Camera 实例
                const camera_utils_camera = new Camera(video, {
                    onFrame: async () => {
                        await faceMesh.send({ image: video });
                    },
                    width: 1280,
                    height: 720
                });

                console.log('🎥 Camera 实例已创建');

                // 启动摄像头 - 这会触发权限请求
                try {
                    console.log('📹 正在启动摄像头...');
                    camera_utils_camera.start();
                    console.log('✓ 摄像头已启动，开始面部检测...');
                    console.log('💡 提示：请对着摄像头，缓慢移动你的头部，观察 3D 模型是否跟随');
                    
                    // 稍等片刻，然后隐藏加载界面
                    setTimeout(() => {
                        setLoadingStep('step3', true);
                        setLoadingStep('step4', true);
                        loadingDiv.classList.add('hidden');
                    }, 500);
                    
                } catch (error) {
                    console.error('❌ 摄像头启动失败:', error);
                    if (error.name === 'NotAllowedError') {
                        showError('您拒绝了摄像头权限访问。请重新加载页面并允许摄像头权限。');
                    } else if (error.name === 'NotFoundError') {
                        showError('未检测到摄像头设备。请检查硬件连接。');
                    } else {
                        showError('摄像头启动失败: ' + error.message);
                    }
                }

                // ============= LINEAR INTERPOLATION (LERP) =============
                function lerp(start, end, factor) {
                    return start + (end - start) * factor;
                }

                // ============= ANIMATION LOOP =============
                let frameCount = 0;
                let lastTime = Date.now();
                let animationStarted = false;

                function animate() {
                    requestAnimationFrame(animate);

                    // 第一帧时输出信息
                    if (!animationStarted) {
                        animationStarted = true;
                        console.log('🎬 动画循环已启动...');
                    }

                    if (faceDetected) {
                        // Smooth interpolation towards target values
                        smoothing.yaw = lerp(smoothing.yaw, smoothing.targetYaw, lerpFactor);
                        smoothing.pitch = lerp(smoothing.pitch, smoothing.targetPitch, lerpFactor);
                        smoothing.roll = lerp(smoothing.roll, smoothing.targetRoll, lerpFactor);

                        // Apply rotations to head group
                        headGroup.rotation.order = 'YXZ';
                        headGroup.rotation.y = (smoothing.yaw * Math.PI) / 180;
                        headGroup.rotation.x = (smoothing.pitch * Math.PI) / 180;
                        headGroup.rotation.z = (smoothing.roll * Math.PI) / 180;

                        // Update UI
                        document.getElementById('yaw').textContent = smoothing.yaw.toFixed(1);
                        document.getElementById('pitch').textContent = smoothing.pitch.toFixed(1);
                        document.getElementById('roll').textContent = smoothing.roll.toFixed(1);
                    } else {
                        // 面部未检测到，缓慢回到初始位置
                        smoothing.targetYaw = 0;
                        smoothing.targetPitch = 0;
                        smoothing.targetRoll = 0;
                        smoothing.yaw = lerp(smoothing.yaw, 0, 0.05);
                        smoothing.pitch = lerp(smoothing.pitch, 0, 0.05);
                        smoothing.roll = lerp(smoothing.roll, 0, 0.05);
                        
                        headGroup.rotation.y = (smoothing.yaw * Math.PI) / 180;
                        headGroup.rotation.x = (smoothing.pitch * Math.PI) / 180;
                        headGroup.rotation.z = (smoothing.roll * Math.PI) / 180;
                    }

                    // Calculate FPS
                    frameCount++;
                    const currentTime = Date.now();
                    if (currentTime - lastTime >= 1000) {
                        document.getElementById('fps').textContent = frameCount;
                        frameCount = 0;
                        lastTime = currentTime;
                    }

                    renderer.render(scene, camera);
                }

                // ============= WINDOW RESIZE HANDLER =============
                window.addEventListener('resize', () => {
                    const width = window.innerWidth;
                    const height = window.innerHeight;
                    camera.aspect = width / height;
                    camera.updateProjectionMatrix();
                    renderer.setSize(width, height);
                });

                // Start animation
                console.log('✓ 开始动画渲染...');
                animate();

            } catch (error) {
                console.error('初始化错误:', error);
                showError('初始化过程中出错: ' + error.message);
                
                // 即使出错也尝试渲染场景
                const canvas = document.getElementById('canvas');
                const scene = new THREE.Scene();
                scene.background = new THREE.Color(0x0a0e27);
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ canvas });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.render(scene, camera);
            }
        }
    </script>
</body>
</html>
