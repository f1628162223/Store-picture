<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>坐姿评分系统</title>

<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: Arial;
  }

  video {
    position: absolute;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    transform: scaleX(-1);
  }

  canvas {
    position: absolute;
    top: 0;
    left: 0;
  }

  #score {
    position: absolute;
    top: 5vh;
    width: 100%;
    text-align: center;
    font-size: 10vh;
    font-weight: 900;
    color: white;
    text-shadow: 0 0 12px black;
  }

  #warning {
    position: absolute;
    bottom: 10vh;
    left: 50%;
    transform: translateX(-50%);
    font-size: 5vh;
    font-weight: 900;
    color: red;
    background: rgba(0,0,0,0.7);
    border: 3px solid red;
    border-radius: 12px;
    padding: 2vh 4vh;
    display: none;
    text-align: center;
  }
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="score">100</div>
<div id="warning"></div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");
const warningEl = document.getElementById("warning");

let pose;

// =======================
// 用于“平滑评分”（关键修复）
// =======================
let scoreBuffer = [];

// =======================
// 摄像头
// =======================
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user" },
    audio: false
  });

  video.srcObject = stream;

  await new Promise(r => video.onloadedmetadata = r);
  await video.play();
}

// =======================
// 镜像修复
// =======================
function mirror(lm) {
  return lm.map(p => ({ ...p, x: 1 - p.x }));
}

// =======================
// ⭐ 核心评分逻辑（已优化）
// =======================
function calcScore(lm) {

  const nose = lm[0];
  const ls = lm[11];
  const rs = lm[12];
  const lh = lm[23];
  const rh = lm[24];

  if (!nose || !ls || !rs || !lh || !rh) {
    return 100;
  }

  const shoulderX = (ls.x + rs.x) / 2;
  const shoulderY = (ls.y + rs.y) / 2;
  const hipY = (lh.y + rh.y) / 2;

  let score = 100;

  // =========================
  // 🟡 轻微低头（允许写作业）
  // =========================
  const headDrop = nose.y - shoulderY;
  if (headDrop > 0.25) score -= 20;

  // =========================
  // 🔴 前倾（比例判断）
  // =========================
  const bodyLean =
    Math.abs(nose.x - shoulderX) /
    Math.max(0.01, Math.abs(rs.x - ls.x));

  if (bodyLean > 0.28) score -= 30;

  // =========================
  // 🔴 趴桌（强扣分）
  // =========================
  if (nose.y > hipY - 0.10) score -= 50;

  return Math.max(0, score);
}

// =======================
// ⭐ 平滑评分（解决“一直100”问题关键）
// =======================
function smoothScore(newScore) {

  scoreBuffer.push(newScore);

  if (scoreBuffer.length > 8) {
    scoreBuffer.shift();
  }

  const avg =
    scoreBuffer.reduce((a, b) => a + b, 0) / scoreBuffer.length;

  return Math.round(avg);
}

// =======================
// 初始化
// =======================
function initPose() {

  pose = new Pose({
    locateFile: (file) =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
  });

  pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true,
    minDetectionConfidence: 0.4,
    minTrackingConfidence: 0.4
  });

  pose.onResults(onResults);

  loop();
}

// =======================
// 循环
// =======================
async function loop() {
  await pose.send({ image: video });
  requestAnimationFrame(loop);
}

// =======================
// 结果
// =======================
function onResults(results) {

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!results.poseLandmarks) return;

  const lm = mirror(results.poseLandmarks);

  drawConnectors(ctx, lm, Pose.POSE_CONNECTIONS);
  drawLandmarks(ctx, lm);

  // =======================
  // 计算评分
  // =======================
  const rawScore = calcScore(lm);
  const score = smoothScore(rawScore);

  scoreEl.innerText = score;

  // =======================
  // 提示逻辑
  // =======================
  let msg = "";

  if (score < 70) {
    if (rawScore < 40) msg = "趴桌 / 距离过近";
    else if (rawScore < 70) msg = "身体前倾";
    else msg = "坐姿不良";

    warningEl.style.display = "block";
    warningEl.innerText = "⚠ " + msg;
  } else {
    warningEl.style.display = "none";
  }
}

// =======================
// 启动
// =======================
async function start() {
  await startCamera();
  initPose();
}

start();

</script>

</body>
</html>
