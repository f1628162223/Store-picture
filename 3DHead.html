<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FIX HEAD ORIENTATION</title>

<style>
body { margin:0; overflow:hidden; background:#0a0f1e; }
#video{
    position:absolute;
    right:10px;
    top:10px;
    width:180px;
    border:2px solid white;
    border-radius:10px;
}
#info{
    position:absolute;
    left:10px;
    top:10px;
    color:white;
    font-family:monospace;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="c"></canvas>
<div id="info"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>

// ================= SCENE =================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({
    canvas:document.getElementById("c"),
    antialias:true
});
renderer.setSize(innerWidth, innerHeight);

// light
scene.add(new THREE.AmbientLight(0xffffff, 1.4));
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,5,5);
scene.add(light);

// ================= ROOT FIX（关键） =================
const headRoot = new THREE.Group();
scene.add(headRoot);

// ================= HEAD =================
function createHead(){

    const g = new THREE.Group();

    const skin = new THREE.MeshPhongMaterial({color:0xffd2a1});

    const head = new THREE.Mesh(
        new THREE.SphereGeometry(1,32,32),
        skin
    );
    head.scale.set(1,1.1,0.9);
    g.add(head);

    const eyeMat = new THREE.MeshPhongMaterial({color:0xffffff});
    const pupilMat = new THREE.MeshPhongMaterial({color:0x000});

    const eyeGeo = new THREE.SphereGeometry(0.18,16,16);
    const pupilGeo = new THREE.SphereGeometry(0.08,16,16);

    const le = new THREE.Mesh(eyeGeo, eyeMat);
    le.position.set(-0.35,0.35,0.85);
    g.add(le);

    const re = le.clone();
    re.position.x = 0.35;
    g.add(re);

    const lp = new THREE.Mesh(pupilGeo, pupilMat);
    lp.position.set(-0.35,0.35,1.05);
    g.add(lp);

    const rp = lp.clone();
    rp.position.x = 0.35;
    g.add(rp);

    return g;
}

const head = createHead();

// 👉 放进 root
headRoot.add(head);

// ================= SMOOTH =================
let rot = {x:0,y:0,z:0};
const lerp = (a,b,t)=>a+(b-a)*t;

// ================= FACE =================
const video = document.getElementById("video");

const faceMesh = new FaceMesh({
    locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
});

faceMesh.setOptions({
    maxNumFaces:1,
    refineLandmarks:true,
    minDetectionConfidence:0.5,
    minTrackingConfidence:0.5
});

function pose(lm){
    const nose = lm[1];
    const le = lm[33];
    const re = lm[263];
    const chin = lm[152];

    return {
        yaw: (re.x - le.x) * 180,
        pitch: (chin.y - nose.y) * 200,
        roll: (re.y - le.y) * 200
    };
}

faceMesh.onResults(res=>{

    if(!res.multiFaceLandmarks?.length) return;

    const lm = res.multiFaceLandmarks[0];
    const p = pose(lm);

    rot.y = lerp(rot.y, p.yaw, 0.15);
    rot.x = lerp(rot.x, p.pitch, 0.15);
    rot.z = lerp(rot.z, p.roll, 0.15);

    // ================= FIX CORE =================
    head.rotation.order = "YXZ";

    head.rotation.y = rot.y * Math.PI / 180;
    head.rotation.x = -rot.x * Math.PI / 180;
    head.rotation.z = rot.z * Math.PI / 180;

    document.getElementById("info").innerHTML =
    `yaw:${rot.y.toFixed(1)}<br>
     pitch:${rot.x.toFixed(1)}<br>
     roll:${rot.z.toFixed(1)}`;
});

// ================= CAMERA =================
const cam = new Camera(video,{
    onFrame: async ()=>{
        await faceMesh.send({image:video});
    },
    width:640,
    height:480
});

cam.start();

// ================= LOOP =================
function animate(){
    requestAnimationFrame(animate);
    renderer.render(scene,camera);
}
animate();

addEventListener("resize",()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
