<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>3D坐姿检测完整版</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
  }

  video {
    position: absolute;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    transform: scaleX(-1);
  }

  #status {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 20px;
    z-index: 10;
  }
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<div id="status">初始化中...</div>

<!-- MediaPipe（必须用 script，不要 import） -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>

<!-- Three.js -->
<script type="module">

import * as THREE from 'https://esm.sh/three@0.158.0';
import { GLTFLoader } from 'https://esm.sh/three@0.158.0/examples/jsm/loaders/GLTFLoader.js';

const video = document.getElementById("video");
const statusEl = document.getElementById("status");

let scene, camera, renderer, model;
let pose;

// ==========================
// 摄像头
// ==========================
async function startCamera() {

  const stream = await navigator.mediaDevices.getUserMedia({
    video: true
  });

  video.srcObject = stream;

  await new Promise(r => video.onloadedmetadata = r);
  await video.play();
}

// ==========================
// Three.js 初始化
// ==========================
function init3D() {

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  camera.position.set(0, 0, 2.5);

  renderer = new THREE.WebGLRenderer({
    antialias: true,
    alpha: true
  });

  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // ==========================
  // 🔥 强光（防止模型看不见）
  // ==========================
  scene.add(new THREE.AmbientLight(0xffffff, 2));

  const light = new THREE.DirectionalLight(0xffffff, 2);
  light.position.set(2, 2, 2);
  scene.add(light);

  // ==========================
  // 加载模型
  // ==========================
  const loader = new GLTFLoader();

  loader.load(
    './puppycat_head.glb',

    (gltf) => {

      model = gltf.scene;
      scene.add(model);

      console.log("✔ 模型加载成功");

      // ==========================
      // ⭐ 核心：自动居中 + 放大
      // ==========================
      const box = new THREE.Box3().setFromObject(model);
      const size = box.getSize(new THREE.Vector3()).length();
      const center = box.getCenter(new THREE.Vector3());

      model.position.sub(center);

      const scale = 2.5 / size;
      model.scale.setScalar(scale);

      model.position.y = -0.2;

      statusEl.innerText = "✔ 模型已加载";
    },

    (xhr) => {
      statusEl.innerText =
        "加载中 " + Math.round(xhr.loaded / xhr.total * 100) + "%";
    },

    (err) => {
      console.error(err);
      statusEl.innerText = "❌ 模型加载失败";
    }
  );

  animate();
}

// ==========================
// 姿态计算
// ==========================
function getAngles(lm) {

  const nose = lm[0];
  const ls = lm[11];
  const rs = lm[12];

  const midY = (ls.y + rs.y) / 2;

  return {
    pitch: (nose.y - midY) * 6,
    roll: (rs.y - ls.y) * 6,
    yaw: (0.5 - nose.x) * 6
  };
}

// ==========================
// 驱动模型
// ==========================
function updateModel({ pitch, roll, yaw }) {

  if (!model) return;

  const limit = 1.2;

  pitch = Math.max(-limit, Math.min(limit, pitch));
  roll  = Math.max(-limit, Math.min(limit, roll));
  yaw   = Math.max(-limit, Math.min(limit, yaw));

  model.rotation.x = -pitch;
  model.rotation.y = yaw;
  model.rotation.z = roll;

  if (Math.abs(pitch) > 0.6) {
    statusEl.innerText = "⚠ 低头过多";
  } else if (Math.abs(roll) > 0.6) {
    statusEl.innerText = "⚠ 头部歪斜";
  } else {
    statusEl.innerText = "✔ 姿势良好";
  }
}

// ==========================
// MediaPipe
// ==========================
function initPose() {

  pose = new window.Pose({
    locateFile: (file) =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
  });

  pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true
  });

  pose.onResults((res) => {

    if (!res.poseLandmarks) return;

    const angles = getAngles(res.poseLandmarks);

    updateModel(angles);
  });

  loop();
}

async function loop() {
  await pose.send({ image: video });
  requestAnimationFrame(loop);
}

// ==========================
// 渲染循环
// ==========================
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}

// ==========================
// 启动
// ==========================
(async () => {

  await startCamera();

  init3D();
  initPose();

})();

</script>

</body>
</html>
