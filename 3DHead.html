<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>坐姿检测（优化显示版）</title>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
      font-family: Arial;
    }

    video {
      position: absolute;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      transform: scaleX(-1);
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }

    /* ===== 状态文字（更大） ===== */
    #status {
      position: absolute;
      top: 20px;
      width: 100%;
      text-align: center;
      color: #00ffcc;
      font-size: 24px;
      font-weight: bold;
      text-shadow: 0 0 8px black;
    }

    /* ===== 警告文字（重点放大） ===== */
    #warning {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      padding: 16px 28px;

      font-size: 42px;
      font-weight: 900;
      color: #ff2b2b;

      background: rgba(0, 0, 0, 0.6);
      border: 3px solid #ff2b2b;
      border-radius: 12px;

      text-shadow: 0 0 10px black;
      display: none;
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="status">等待摄像头开启...</div>
<div id="warning">⚠ 坐姿不端正！请坐直</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const warning = document.getElementById("warning");
const status = document.getElementById("status");

// ===== 打开摄像头 =====
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user" },
      audio: false
    });

    video.srcObject = stream;

    video.onloadedmetadata = () => {
      video.play();
      status.innerText = "摄像头已开启，正在检测坐姿...";
      startPose();
    };

  } catch (err) {
    status.innerText = "摄像头启动失败";
    console.error(err);
  }
}

// ===== 判断坐姿 =====
function isBadPosture(landmarks) {
  const nose = landmarks[0];
  const leftShoulder = landmarks[11];
  const rightShoulder = landmarks[12];

  if (!nose || !leftShoulder || !rightShoulder) return false;

  const shoulderX = (leftShoulder.x + rightShoulder.x) / 2;

  return Math.abs(nose.x - shoulderX) > 0.08;
}

// ===== 姿态检测 =====
function startPose() {
  const pose = new Pose.Pose({
    locateFile: (file) =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
  });

  pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5
  });

  pose.onResults(onResults);

  async function loop() {
    await pose.send({ image: video });
    requestAnimationFrame(loop);
  }

  loop();
}

// ===== 结果处理 =====
function onResults(results) {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (results.poseLandmarks) {
    drawConnectors(ctx, results.poseLandmarks, Pose.POSE_CONNECTIONS);
    drawLandmarks(ctx, results.poseLandmarks);

    if (isBadPosture(results.poseLandmarks)) {
      warning.style.display = "block";
    } else {
      warning.style.display = "none";
    }
  }
}

// ===== 启动 =====
startCamera();
</script>

</body>
</html>
