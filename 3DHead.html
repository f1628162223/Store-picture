<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>卡通坐姿跟随系统</title>

<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
  }

  video {
    position: absolute;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    transform: scaleX(-1);
  }

  canvas {
    position: absolute;
    top: 0;
    left: 0;
  }

  /* ===== 卡通头 ===== */
  #animal {
    position: absolute;
    width: 180px;
    height: 180px;
    left: 50%;
    top: 20%;
    transform: translateX(-50%);
    transition: transform 0.06s linear;
  }

  #face {
    width: 100%;
    height: 100%;
    background: #ffd54f;
    border-radius: 50%;
    position: relative;
    box-shadow: 0 0 20px rgba(255,255,255,0.3);
  }

  .eye {
    width: 20px;
    height: 20px;
    background: black;
    border-radius: 50%;
    position: absolute;
    top: 55px;
  }

  #eyeL { left: 45px; }
  #eyeR { right: 45px; }

  #mouth {
    width: 60px;
    height: 20px;
    border-bottom: 5px solid black;
    border-radius: 50%;
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
  }

  #status {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 22px;
  }
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="animal">
  <div id="face">
    <div class="eye" id="eyeL"></div>
    <div class="eye" id="eyeR"></div>
    <div id="mouth"></div>
  </div>
</div>

<div id="status">初始化中...</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const animal = document.getElementById("animal");
const statusEl = document.getElementById("status");

let pose;

// =========================
// 摄像头
// =========================
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;
  await new Promise(r => video.onloadedmetadata = r);
  await video.play();
}

// =========================
// 非线性放大（关键优化）
// =========================
function amplify(x) {
  return Math.sign(x) * Math.pow(Math.abs(x), 1.5);
}

// =========================
// 头部姿态计算（修正版）
// =========================
function getHeadAngles(lm) {

  const nose = lm[0];
  const ls = lm[11];
  const rs = lm[12];

  const midY = (ls.y + rs.y) / 2;

  // ✔ 低头（放大 + 非线性）
  let pitch = amplify(nose.y - midY) * 500;

  // ✔ 左右歪头（修正方向 + 放大）
  let roll = amplify(rs.y - ls.y) * 500;

  // ✔ 左右转头（修正镜像 + 放大）
  let yaw = amplify(0.5 - nose.x) * 500;

  // ===== 死区（防抖动）=====
  if (Math.abs(pitch) < 3) pitch = 0;
  if (Math.abs(roll) < 3) roll = 0;
  if (Math.abs(yaw) < 3) yaw = 0;

  return { pitch, roll, yaw };
}

// =========================
// 驱动卡通头
// =========================
function updateAnimal({pitch, roll, yaw}) {

  // 限制最大角度（防翻车）
  pitch = Math.max(-40, Math.min(40, pitch));
  roll  = Math.max(-40, Math.min(40, roll));
  yaw   = Math.max(-40, Math.min(40, yaw));

  animal.style.transform =
    `translateX(-50%)
     rotate(${roll}deg)
     rotateX(${-pitch}deg)
     rotateY(${yaw}deg)`;

  // ===== 状态提示 =====
  if (Math.abs(pitch) > 15) {
    statusEl.innerText = "⚠ 低头过多";
  } else if (Math.abs(roll) > 15) {
    statusEl.innerText = "⚠ 头部歪斜";
  } else {
    statusEl.innerText = "✔ 姿势良好";
  }
}

// =========================
// MediaPipe初始化
// =========================
function initPose() {

  pose = new Pose({
    locateFile: f =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`
  });

  pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true
  });

  pose.onResults(res => {

    if (!res.poseLandmarks) return;

    const lm = res.poseLandmarks;

    // ===== 可视化骨架（调试用）=====
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawConnectors(ctx, lm, Pose.POSE_CONNECTIONS);
    drawLandmarks(ctx, lm);

    // ===== 计算姿态 =====
    const angles = getHeadAngles(lm);

    // ===== 驱动卡通头 =====
    updateAnimal(angles);
  });

  loop();
}

// =========================
// 循环
// =========================
async function loop() {
  await pose.send({ image: video });
  requestAnimationFrame(loop);
}

// =========================
// 启动
// =========================
(async () => {
  await startCamera();
  initPose();
})();

</script>

</body>
</html>
