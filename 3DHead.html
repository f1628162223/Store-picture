<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Face Tracking FIX</title>
<style>
body { margin:0; overflow:hidden; background:#000; }
#video { position:absolute; right:10px; top:10px; width:200px; border:2px solid #fff; }
#info { position:absolute; left:10px; top:10px; color:#fff; font-family:monospace; }
</style>
</head>
<body>

<video id="video" autoplay playsinline></video>
<div id="info"></div>
<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>

let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 5;

let renderer = new THREE.WebGLRenderer({canvas:document.getElementById("c"), antialias:true});
renderer.setSize(innerWidth, innerHeight);

scene.add(new THREE.AmbientLight(0xffffff,1));

let head = new THREE.Mesh(
    new THREE.SphereGeometry(1,32,32),
    new THREE.MeshNormalMaterial()
);
scene.add(head);

// smoothing
let rot = {x:0,y:0,z:0};

function lerp(a,b,t){ return a+(b-a)*t; }

// FaceMesh
const video = document.getElementById("video");

const faceMesh = new FaceMesh({
    locateFile: (file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
});

faceMesh.setOptions({
    maxNumFaces:1,
    refineLandmarks:true,
    minDetectionConfidence:0.5,
    minTrackingConfidence:0.5
});

// 更稳定的 3D head pose 估算（改进版）
function estimatePose(lm){

    // MediaPipe关键点
    const nose = lm[1];
    const leftEye = lm[33];
    const rightEye = lm[263];
    const chin = lm[152];

    // YAW：左右眼差
    let yaw = (rightEye.x - leftEye.x);

    // PITCH：鼻子-下巴
    let pitch = (chin.y - nose.y);

    // ROLL：眼睛倾斜
    let roll = (rightEye.y - leftEye.y);

    return {
        yaw: yaw * 180,
        pitch: pitch * 200,
        roll: roll * 200
    };
}

faceMesh.onResults(results => {

    if(!results.multiFaceLandmarks?.length) return;

    let lm = results.multiFaceLandmarks[0];

    let p = estimatePose(lm);

    // smooth
    rot.y = lerp(rot.y, p.yaw, 0.15);
    rot.x = lerp(rot.x, p.pitch, 0.15);
    rot.z = lerp(rot.z, p.roll, 0.15);

    // apply
    head.rotation.y = rot.y * Math.PI / 180;
    head.rotation.x = -rot.x * Math.PI / 180;
    head.rotation.z = rot.z * Math.PI / 180;

    document.getElementById("info").innerHTML =
    `yaw:${rot.y.toFixed(1)}<br>pitch:${rot.x.toFixed(1)}<br>roll:${rot.z.toFixed(1)}`;
});

const cam = new Camera(video, {
    onFrame: async ()=>{
        await faceMesh.send({image:video});
    },
    width:640,
    height:480
});

cam.start();

function animate(){
    requestAnimationFrame(animate);
    renderer.render(scene,camera);
}
animate();

</script>

</body>
</html>
