<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>3D头部替身（修复朝向版）</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
  }

  #status {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 18px;
    z-index: 10;
  }
</style>
</head>

<body>

<div id="status">初始化...</div>

<!-- MediaPipe（必须script方式） -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>

<!-- Three.js（非module，避免冲突） -->
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/loaders/GLTFLoader.js"></script>

<script>

const statusEl = document.getElementById("status");

let scene, camera, renderer, model;
let pose;
let video;

// ==========================
// 摄像头（隐藏使用）
// ==========================
async function initCamera() {

  video = document.createElement("video");

  const stream = await navigator.mediaDevices.getUserMedia({
    video: true
  });

  video.srcObject = stream;

  await video.play();
}

// ==========================
// Three.js 初始化
// ==========================
function init3D() {

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  camera.position.set(0, 0, 2.2);

  renderer = new THREE.WebGLRenderer({
    antialias: true,
    alpha: true
  });

  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // ===== 光 =====
  scene.add(new THREE.AmbientLight(0xffffff, 2));

  const light = new THREE.DirectionalLight(0xffffff, 2);
  light.position.set(2, 2, 2);
  scene.add(light);

  // ==========================
  // 加载模型
  // ==========================
  const loader = new THREE.GLTFLoader();

  loader.load("./puppycat_head.glb", (gltf) => {

    model = gltf.scene;
    scene.add(model);

    console.log("✔ 模型加载成功");

    // ==========================
    // ⭐ 自动居中 + 缩放
    // ==========================
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3()).length();
    const center = box.getCenter(new THREE.Vector3());

    model.position.sub(center);

    const scale = 2.5 / size;
    model.scale.setScalar(scale);

    // ==========================
    // ⭐ 关键：正对用户（修复背面问题）
    // ==========================
    model.rotation.y = Math.PI;

    statusEl.innerText = "✔ 模型已就位";
  });

  animate();
}

// ==========================
// 姿态计算
// ==========================
function getPose(lm) {

  const nose = lm[0];
  const ls = lm[11];
  const rs = lm[12];

  const midY = (ls.y + rs.y) / 2;

  return {
    pitch: (nose.y - midY) * 6,
    roll: (rs.y - ls.y) * 6,
    yaw: (0.5 - nose.x) * 6
  };
}

// ==========================
// 驱动模型（核心修复）
// ==========================
function updateModel({ pitch, roll, yaw }) {

  if (!model) return;

  const limit = 1.2;

  pitch = Math.max(-limit, Math.min(limit, pitch));
  roll  = Math.max(-limit, Math.min(limit, roll));
  yaw   = Math.max(-limit, Math.min(limit, yaw));

  // ==========================
  // ⭐ 修复方向（关键）
  // ==========================

  model.rotation.x = pitch;          // 低头/抬头
  model.rotation.y = -yaw + Math.PI; // 左右 + 正对用户
  model.rotation.z = roll;           // 歪头

  if (Math.abs(pitch) > 0.6) {
    statusEl.innerText = "⚠ 低头过多";
  } else if (Math.abs(roll) > 0.6) {
    statusEl.innerText = "⚠ 头部歪斜";
  } else {
    statusEl.innerText = "✔ 姿势正常";
  }
}

// ==========================
// MediaPipe
// ==========================
function initPose() {

  pose = new window.Pose({
    locateFile: (file) =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
  });

  pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true
  });

  pose.onResults((res) => {

    if (!res.poseLandmarks) return;

    const angles = getPose(res.poseLandmarks);

    updateModel(angles);
  });

  loop();
}

async function loop() {
  await pose.send({ image: video });
  requestAnimationFrame(loop);
}

// ==========================
// 渲染循环
// ==========================
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}

// ==========================
// 启动
// ==========================
(async () => {

  await initCamera();
  init3D();
  initPose();

})();

</script>

</body>
</html>
