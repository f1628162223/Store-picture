<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>AI坐姿 + 正确视角版</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
  }

  video {
    position: absolute;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    transform: scaleX(-1);
    opacity: 0;
  }

  #status {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 18px;
    z-index: 10;
  }
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<div id="status">初始化中...</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>

<script type="module">

import * as THREE from 'https://esm.sh/three@0.158.0';
import { GLTFLoader } from 'https://esm.sh/three@0.158.0/examples/jsm/loaders/GLTFLoader.js';

const video = document.getElementById("video");
const statusEl = document.getElementById("status");

let scene, camera, renderer;
let model;
let pose;
let baseRotationY = 0;

// =========================
// 摄像头
// =========================
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;
  await new Promise(r => video.onloadedmetadata = r);
  await video.play();
}

// =========================
// 3D初始化（关键修复全部在这里）
// =========================
function init3D() {

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    60,
    innerWidth / innerHeight,
    0.1,
    1000
  );

  // ⭐ 关键修复1：避免俯视
  camera.position.set(0, 0.15, 2.2);

  // ⭐ 关键修复2：稳定对准“脸部区域”
  camera.lookAt(0, 0.15, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);

  scene.add(new THREE.DirectionalLight(0xffffff, 1));
  scene.add(new THREE.AmbientLight(0xffffff, 0.6));

  const loader = new GLTFLoader();

  loader.load('./puppycat_head.glb', (gltf) => {

    const raw = gltf.scene;

    const pivot = new THREE.Group();
    scene.add(pivot);
    pivot.add(raw);

    model = pivot;

    // =========================
    // ⭐ 正确修复：不要只用中心点
    // =========================
    const box = new THREE.Box3().setFromObject(raw);
    const size = box.getSize(new THREE.Vector3());

    const center = box.getCenter(new THREE.Vector3());
    raw.position.sub(center);

    // ⭐ 关键：向下移动，让“脸”进入视野中心
    raw.position.y -= size.y * 0.35;

    // 缩放
    raw.scale.setScalar(2 / size.length());

    // =========================
    // ⭐ 固定朝向（不要再自动猜）
    // =========================
    baseRotationY = Math.PI;
    model.rotation.y = baseRotationY;

    statusEl.innerText = "✔ 模型加载成功（视角已修复）";

  });

  animate();
}

// =========================
// 渲染
// =========================
function animate() {
  requestAnimationFrame(animate);

  // ⭐ 强制稳定视角
  camera.lookAt(0, 0.15, 0);

  renderer.render(scene, camera);
}

// =========================
// 姿态
// =========================
function getAngles(lm) {

  const nose = lm[0];
  const ls = lm[11];
  const rs = lm[12];

  const midY = (ls.y + rs.y) / 2;

  return {
    pitch: (nose.y - midY) * 6,
    roll: (rs.y - ls.y) * 6,
    yaw: (0.5 - nose.x) * 6
  };
}

// =========================
// 驱动模型
// =========================
function updateModel({pitch, yaw, roll}) {

  if (!model) return;

  const limit = 1.2;

  model.rotation.x = -Math.max(-limit, Math.min(limit, pitch));
  model.rotation.y = baseRotationY + Math.max(-limit, Math.min(limit, yaw));
  model.rotation.z = Math.max(-limit, Math.min(limit, roll));

  if (Math.abs(pitch) > 0.6) {
    statusEl.innerText = "⚠ 低头过多";
  } else if (Math.abs(roll) > 0.6) {
    statusEl.innerText = "⚠ 身体歪斜";
  } else {
    statusEl.innerText = "✔ 姿势良好";
  }
}

// =========================
// MediaPipe
// =========================
function initPose() {

  const pose = new Pose({
    locateFile: f =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`
  });

  pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true
  });

  pose.onResults(res => {
    if (!res.poseLandmarks) return;
    updateModel(getAngles(res.poseLandmarks));
  });

  loop();

  async function loop() {
    await pose.send({ image: video });
    requestAnimationFrame(loop);
  }
}

// =========================
// 启动
// =========================
(async () => {
  await startCamera();
  init3D();
  initPose();
})();

</script>

</body>
</html>
