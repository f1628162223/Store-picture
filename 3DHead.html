<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>3D模型展示（锁定旋转版）</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #111;
  }

  #status {
    position: absolute;
    top: 20px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 18px;
  }
</style>
</head>

<body>

<div id="status">加载模型中...</div>

<script type="module">

import * as THREE from 'https://esm.sh/three@0.158.0';
import { GLTFLoader } from 'https://esm.sh/three@0.158.0/examples/jsm/loaders/GLTFLoader.js';

const statusEl = document.getElementById("status");

let scene, camera, renderer, model;

init();

function init() {

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  camera.position.set(0, 0, 2);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // 光照
  scene.add(new THREE.DirectionalLight(0xffffff, 1));
  scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.2));

  const loader = new GLTFLoader();

  loader.load('./puppycat_head.glb', (gltf) => {

    model = gltf.scene;
    scene.add(model);

    // =========================
    // 自动居中 + 缩放
    // =========================
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());

    model.position.sub(center);

    const scale = 2 / size.length();
    model.scale.setScalar(scale);

    // =========================
    // ⭐ 关键：彻底禁止旋转
    // =========================
    model.rotation.set(0, 0, 0);

    // 防止未来被外部修改
    model.matrixAutoUpdate = false;

    model.updateMatrix();

    statusEl.innerText = "✔ 加载成功（已锁定旋转）";

  });

  animate();
}

// =========================
// 渲染（无任何旋转）
// =========================
function animate() {
  requestAnimationFrame(animate);

  // ❌ 删除所有 rotation 代码

  renderer.render(scene, camera);
}

// =========================
// 自适应
// =========================
window.addEventListener("resize", () => {

  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();

  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
