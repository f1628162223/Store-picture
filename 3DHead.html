<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>卡通头姿态跟随</title>

<style>
  body {
    margin: 0;
    background: #000;
    overflow: hidden;
    font-family: sans-serif;
  }

  video {
    position: absolute;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    transform: scaleX(-1);
  }

  canvas {
    position: absolute;
    top: 0;
    left: 0;
  }

  /* ===== 卡通头 ===== */
  #animal {
    position: absolute;
    width: 180px;
    height: 180px;
    left: 50%;
    top: 20%;
    transform: translateX(-50%);
    transition: transform 0.08s linear;
  }

  #face {
    width: 100%;
    height: 100%;
    background: #ffd54f;
    border-radius: 50%;
    position: relative;
    box-shadow: 0 0 20px rgba(255,255,255,0.3);
  }

  .eye {
    width: 20px;
    height: 20px;
    background: black;
    border-radius: 50%;
    position: absolute;
    top: 55px;
  }

  #eyeL { left: 45px; }
  #eyeR { right: 45px; }

  #mouth {
    width: 60px;
    height: 20px;
    border-bottom: 5px solid black;
    border-radius: 50%;
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
  }

  #status {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 20px;
  }
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="animal">
  <div id="face">
    <div class="eye" id="eyeL"></div>
    <div class="eye" id="eyeR"></div>
    <div id="mouth"></div>
  </div>
</div>

<div id="status">初始化中...</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const animal = document.getElementById("animal");
const statusEl = document.getElementById("status");

let pose;

// =========================
// 摄像头
// =========================
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;
  await new Promise(r => video.onloadedmetadata = r);
  await video.play();
}

// =========================
// 姿态计算（核心）
// =========================
function getHeadAngles(lm) {

  const nose = lm[0];
  const ls = lm[11];
  const rs = lm[12];

  // 左右歪头（roll）
  const roll = (ls.y - rs.y) * 100;

  // 低头（pitch）
  const pitch = (nose.y - (ls.y + rs.y)/2) * 100;

  // 左右转头（yaw 简化）
  const yaw = (nose.x - 0.5) * 100;

  return { pitch, roll, yaw };
}

// =========================
// 动画映射（关键）
// =========================
function updateAnimal({pitch, roll, yaw}) {

  // 限制范围
  pitch = Math.max(-30, Math.min(30, pitch));
  roll  = Math.max(-30, Math.min(30, roll));
  yaw   = Math.max(-30, Math.min(30, yaw));

  animal.style.transform =
    `translateX(-50%) 
     rotate(${roll}deg) 
     rotateX(${-pitch}deg)
     rotateY(${yaw}deg)`;

  // 状态提示
  if (Math.abs(pitch) > 15) {
    statusEl.innerText = "⚠ 低头过多";
  } else if (Math.abs(roll) > 15) {
    statusEl.innerText = "⚠ 头部歪斜";
  } else {
    statusEl.innerText = "✔ 姿势良好";
  }
}

// =========================
// MediaPipe初始化
// =========================
function initPose() {

  pose = new Pose({
    locateFile: f =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`
  });

  pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true
  });

  pose.onResults(res => {

    if (!res.poseLandmarks) return;

    const lm = res.poseLandmarks;

    // 可视化（可关掉）
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawConnectors(ctx, lm, Pose.POSE_CONNECTIONS);
    drawLandmarks(ctx, lm);

    // ===== 计算姿态 =====
    const angles = getHeadAngles(lm);

    // ===== 驱动卡通头 =====
    updateAnimal(angles);
  });

  loop();
}

// =========================
// 循环
// =========================
async function loop() {
  await pose.send({ image: video });
  requestAnimationFrame(loop);
}

// =========================
// 启动
// =========================
(async () => {
  await startCamera();
  initPose();
})();

</script>

</body>
</html>
