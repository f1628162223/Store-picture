<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>高灵敏坐姿检测系统</title>

<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: Arial;
  }

  video {
    position: absolute;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    transform: scaleX(-1);
  }

  canvas {
    position: absolute;
    top: 0;
    left: 0;
  }

  #score {
    position: absolute;
    top: 5vh;
    width: 100%;
    text-align: center;
    font-size: 10vh;
    font-weight: 900;
    color: white;
  }

  #warning {
    position: absolute;
    bottom: 10vh;
    left: 50%;
    transform: translateX(-50%);
    font-size: 5.5vh;
    font-weight: 900;
    color: red;
    background: rgba(0,0,0,0.75);
    border: 3px solid red;
    border-radius: 12px;
    padding: 2vh 4vh;
    display: none;
    text-align: center;
  }
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="score">100</div>
<div id="warning"></div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");
const warningEl = document.getElementById("warning");

let pose;
let scoreBuffer = [];
let badFrames = 0;

// =========================
// 摄像头
// =========================
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user" },
    audio: false
  });

  video.srcObject = stream;

  await new Promise(r => video.onloadedmetadata = r);
  await video.play();
}

// =========================
// 镜像修复
// =========================
function mirror(lm) {
  return lm.map(p => ({ ...p, x: 1 - p.x }));
}

// =========================
// 🔥 高灵敏角度级分析（核心升级）
// =========================
function analyze(lm) {

  const nose = lm[0];
  const ls = lm[11];
  const rs = lm[12];
  const lh = lm[23];
  const rh = lm[24];

  if (!nose || !ls || !rs || !lh || !rh) {
    return { score: 100, bad: false, msg: "" };
  }

  const shoulderX = (ls.x + rs.x) / 2;
  const shoulderY = (ls.y + rs.y) / 2;
  const hipX = (lh.x + rh.x) / 2;
  const hipY = (lh.y + rh.y) / 2;

  let score = 100;
  let reasons = [];

  // =========================
  // 🔥 1. 头部前伸（灵敏核心）
  // =========================
  const headForward = Math.abs(nose.x - shoulderX);

  if (headForward > 0.06) {
    score -= 35;
    reasons.push("头部前伸");
  }

  // =========================
  // 🔥 2. 脊柱角度（驼背核心）
  // =========================
  const spineAngle = Math.abs(shoulderY - hipY);

  // 正常约 0.12~0.18
  if (spineAngle > 0.16) {
    score -= 40;
    reasons.push("驼背");
  }

  // =========================
  // 🔥 3. 头低过多（写作业保护阈值）
  // =========================
  const headDrop = nose.y - shoulderY;

  if (headDrop > 0.12) {
    score -= 25;
    reasons.push("低头过多");
  }

  // =========================
  // 🔥 4. 趴桌（强识别）
  // =========================
  if (nose.y > hipY - 0.08) {
    score -= 50;
    reasons.push("趴桌姿势");
  }

  return {
    score: Math.max(0, score),
    bad: score < 75,
    msg: reasons.join(" / ")
  };
}

// =========================
// ⭐ 平滑 + 保留异常（防漏报）
// =========================
function smoothScore(newScore) {

  scoreBuffer.push(newScore);

  if (scoreBuffer.length > 5) {
    scoreBuffer.shift();
  }

  const avg = scoreBuffer.reduce((a, b) => a + b, 0) / scoreBuffer.length;
  const min = Math.min(...scoreBuffer);

  return Math.round(avg * 0.55 + min * 0.45);
}

// =========================
// 初始化
// =========================
function initPose() {

  pose = new Pose({
    locateFile: (file) =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
  });

  pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true,
    minDetectionConfidence: 0.4,
    minTrackingConfidence: 0.4
  });

  pose.onResults(onResults);

  loop();
}

// =========================
// 循环
// =========================
async function loop() {
  await pose.send({ image: video });
  requestAnimationFrame(loop);
}

// =========================
// 结果处理
// =========================
function onResults(results) {

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!results.poseLandmarks) return;

  const lm = mirror(results.poseLandmarks);

  drawConnectors(ctx, lm, Pose.POSE_CONNECTIONS);
  drawLandmarks(ctx, lm);

  const raw = analyze(lm);
  const score = smoothScore(raw.score);

  scoreEl.innerText = score;

  // =========================
  // 🔥 高灵敏报警逻辑
  // =========================
  if (raw.score < 65) {
    badFrames += 2;
  } else {
    badFrames = Math.max(0, badFrames - 1);
  }

  if (badFrames > 4) {
    warningEl.style.display = "block";

    if (raw.score < 40) {
      warningEl.innerText = "⚠ 趴桌 / 距离过近";
    } else {
      warningEl.innerText = "⚠ 坐姿不良：" + raw.msg;
    }
  } else {
    warningEl.style.display = "none";
  }
}

// =========================
// 启动
// =========================
async function start() {
  await startCamera();
  initPose();
}

start();

</script>

</body>
</html>
