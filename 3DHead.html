<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>坐姿检测</title>

<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
  }

  video {
    position: absolute;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    transform: scaleX(-1);
  }

  canvas {
    position: absolute;
    top: 0;
    left: 0;
  }

  /* 只保留警告 */
  #warning {
    position: absolute;
    bottom: 12vh;
    left: 50%;
    transform: translateX(-50%);
    font-size: 6vh;
    font-weight: 900;
    color: red;

    background: rgba(0,0,0,0.6);
    border: 3px solid red;
    border-radius: 12px;

    padding: 2vh 4vh;
    display: none;
  }
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="warning">⚠ 坐姿不正确，请坐直</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const warning = document.getElementById("warning");

let pose;
let running = false;

// ======================
// 摄像头
// ======================
async function startCamera() {

  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user" },
    audio: false
  });

  video.srcObject = stream;

  return new Promise(resolve => {
    video.onloadedmetadata = () => {
      video.play();
      resolve();
    };
  });
}

// ======================
// 镜像修复
// ======================
function mirror(lm) {
  return lm.map(p => ({
    ...p,
    x: 1 - p.x
  }));
}

// ======================
// 初始化
// ======================
function initPose() {

  pose = new Pose({
    locateFile: (file) =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
  });

  pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5
  });

  pose.onResults(onResults);

  running = true;
  loop();
}

// ======================
// 循环
// ======================
async function loop() {
  if (!running) return;

  await pose.send({ image: video });

  setTimeout(loop, 33);
}

// ======================
// 坐姿判断（核心）
// ======================
function isBadPosture(lm) {

  const nose = lm[0];
  const ls = lm[11];
  const rs = lm[12];
  const lh = lm[23];
  const rh = lm[24];

  if (!nose || !ls || !rs || !lh || !rh) return false;

  const shoulderX = (ls.x + rs.x) / 2;
  const shoulderY = (ls.y + rs.y) / 2;
  const hipY = (lh.y + rh.y) / 2;

  // 前倾 / 驼背判断
  const forward = Math.abs(nose.x - shoulderX) > 0.1;
  const hunch = nose.y > shoulderY + 0.12;
  const slouch = nose.y > hipY - 0.05;

  return forward || hunch || slouch;
}

// ======================
// 结果
// ======================
function onResults(results) {

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!results.poseLandmarks) return;

  const lm = mirror(results.poseLandmarks);

  drawConnectors(ctx, lm, Pose.POSE_CONNECTIONS);
  drawLandmarks(ctx, lm);

  if (isBadPosture(lm)) {
    warning.style.display = "block";
  } else {
    warning.style.display = "none";
  }
}

// ======================
// 启动
// ======================
async function start() {
  await startCamera();
  initPose();
}

start();

</script>

</body>
</html>
