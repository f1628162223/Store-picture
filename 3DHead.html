<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>3D坐姿系统（基准角4.7版）</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #111;
  }

  #status {
    position: absolute;
    top: 20px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 18px;
  }
</style>
</head>

<body>

<div id="status">加载模型中...</div>

<script type="module">

import * as THREE from 'https://esm.sh/three@0.158.0';
import { GLTFLoader } from 'https://esm.sh/three@0.158.0/examples/jsm/loaders/GLTFLoader.js';

const statusEl = document.getElementById("status");

let scene, camera, renderer, model;

// ⭐ 关键：初始基准角度
let baseRotationY = 4.7;

init();

function init() {

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  camera.position.set(0, 0, 2);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // 光照
  const light1 = new THREE.DirectionalLight(0xffffff, 1);
  light1.position.set(1, 1, 1);
  scene.add(light1);

  const light2 = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
  scene.add(light2);

  const loader = new GLTFLoader();

  loader.load('./puppycat_head.glb', (gltf) => {

    model = gltf.scene;
    scene.add(model);

    // =========================
    // 自动居中
    // =========================
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());

    model.position.sub(center);

    // 缩放
    model.scale.setScalar(2 / size.length());

    // ⭐ 初始化旋转（重点）
    model.rotation.y = baseRotationY;

    statusEl.innerText = "✔ 模型加载成功";
  });

  animate();
}

// =========================
// 渲染
// =========================
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}

// =========================
// 姿态驱动（示例接口）
// =========================
function updateModel({pitch, yaw, roll}) {

  if (!model) return;

  const limit = 1.2;

  // ⭐ 注意：是在 4.7 基础上叠加
  model.rotation.y = baseRotationY + yaw;

  model.rotation.x = -pitch;
  model.rotation.z = roll;
}

// =========================
// 自适应
// =========================
window.addEventListener("resize", () => {

  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();

  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
