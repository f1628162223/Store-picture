<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>坐姿检测</title>

<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: Arial;
  }

  video {
    position: absolute;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    transform: scaleX(-1);
  }

  canvas {
    position: absolute;
    top: 0;
    left: 0;
  }

  #score {
    position: absolute;
    top: 5vh;
    width: 100%;
    text-align: center;
    font-size: 10vh;
    color: white;
  }

  #warning {
    position: absolute;
    bottom: 10vh;
    left: 50%;
    transform: translateX(-50%);
    font-size: 5vh;
    color: red;
    background: rgba(0,0,0,0.7);
    padding: 20px 40px;
    border-radius: 10px;
    display: none;
    text-align: center;
  }
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="score">--</div>
<div id="warning"></div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");
const warningEl = document.getElementById("warning");

let pose;
let base = null;
let baseBuffer = [];
let badFrames = 0;

// =====================
// 摄像头
// =====================
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;
  await new Promise(r => video.onloadedmetadata = r);
  await video.play();
}

// =====================
// 镜像
// =====================
function mirror(lm) {
  return lm.map(p => ({ ...p, x: 1 - p.x }));
}

// =====================
// 自动校准（前40帧）
// =====================
function autoCalibrate(lm) {

  if (base) return;

  baseBuffer.push(lm);

  if (baseBuffer.length < 40) {
    scoreEl.innerText = "请保持坐直";
    return;
  }

  base = lm;
  scoreEl.innerText = "100";
}

// =====================
// 核心检测（稳定版）
// =====================
function analyze(lm) {

  if (!base) return;

  const nose = lm[0];
  const ls = lm[11];
  const rs = lm[12];

  const baseNose = base[0];
  const baseLs = base[11];
  const baseRs = base[12];

  let score = 100;
  let reasons = [];

  // =====================
  // 1. 头前倾
  // =====================
  const forward = Math.abs(nose.x - baseNose.x);
  if (forward > 0.045) {
    score -= 35;
    reasons.push("头前倾");
  }

  // =====================
  // 2. 低头
  // =====================
  const headDown = nose.y - baseNose.y;
  if (headDown > 0.06) {
    score -= 25;
    reasons.push("低头过多");
  }

  // =====================
  // 3. 驼背（肩膀下沉）
  // =====================
  const shoulderNow = (ls.y + rs.y)/2;
  const shoulderBase = (baseLs.y + baseRs.y)/2;

  if (shoulderNow - shoulderBase > 0.04) {
    score -= 30;
    reasons.push("驼背");
  }

  // =====================
  // 4. 身体歪斜
  // =====================
  if (Math.abs(ls.y - rs.y) > 0.045) {
    score -= 25;
    reasons.push("身体歪斜");
  }

  score = Math.max(0, score);
  scoreEl.innerText = score;

  // =====================
  // 报警稳定器
  // =====================
  if (score < 75) badFrames++;
  else badFrames = 0;

  if (badFrames > 3) {
    warningEl.style.display = "block";
    warningEl.innerText = "⚠ " + reasons.join(" / ");
  } else {
    warningEl.style.display = "none";
  }
}

// =====================
// 初始化
// =====================
function initPose() {

  pose = new Pose({
    locateFile: f =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`
  });

  pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true
  });

  pose.onResults(res => {

    if (!res.poseLandmarks) return;

    const lm = mirror(res.poseLandmarks);

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawConnectors(ctx, lm, Pose.POSE_CONNECTIONS);
    drawLandmarks(ctx, lm);

    autoCalibrate(lm);
    analyze(lm);
  });

  loop();
}

async function loop() {
  await pose.send({ image: video });
  requestAnimationFrame(loop);
}

// =====================
// 启动
// =====================
(async () => {
  await startCamera();
  initPose();
})();

</script>

</body>
</html>
