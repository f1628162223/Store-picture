<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>AI坐姿 + 自动朝向校准</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
  }

  video {
    position: absolute;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    transform: scaleX(-1);
    opacity: 0;
  }

  #status {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 18px;
  }
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<div id="status">初始化中...</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>

<script type="module">

import * as THREE from 'https://esm.sh/three@0.158.0';
import { GLTFLoader } from 'https://esm.sh/three@0.158.0/examples/jsm/loaders/GLTFLoader.js';

const video = document.getElementById("video");
const statusEl = document.getElementById("status");

let scene, camera, renderer;
let model; // pivot
let pose;

// =========================
// 摄像头
// =========================
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;
  await new Promise(r => video.onloadedmetadata = r);
  await video.play();
}

// =========================
// Three.js初始化
// =========================
function init3D() {

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    60,
    innerWidth / innerHeight,
    0.1,
    1000
  );

  camera.position.set(0, 0, 2);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);

  scene.add(new THREE.DirectionalLight(0xffffff, 1));
  scene.add(new THREE.AmbientLight(0xffffff, 0.6));

  // =========================
  // 加载模型
  // =========================
  const loader = new GLTFLoader();

  loader.load('./puppycat_head.glb', (gltf) => {

    const raw = gltf.scene;

    // pivot控制层
    const pivot = new THREE.Group();
    scene.add(pivot);
    pivot.add(raw);
    model = pivot;

    // =========================
    // 自动居中
    // =========================
    const box = new THREE.Box3().setFromObject(raw);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3()).length();

    raw.position.sub(center);
    raw.scale.setScalar(2 / size);

    // =========================
    // ⭐ 自动识别正脸方向（核心）
    // =========================
    const helper = new THREE.Box3Helper(box, 0xffff00);
    scene.add(helper);

    // 用bounding box判断“长轴方向”
    const sizeVec = box.getSize(new THREE.Vector3());

    let axis = "z";

    if (sizeVec.x > sizeVec.z && sizeVec.x > sizeVec.y) {
      axis = "x";
    } else if (sizeVec.z > sizeVec.x && sizeVec.z > sizeVec.y) {
      axis = "z";
    }

    // ✔ 自动对齐正脸
    if (axis === "x") {
      raw.rotation.y = Math.PI / 2;
    } else if (axis === "z") {
      raw.rotation.y = 0;
    }

    statusEl.innerText = "✔ 模型加载完成（自动校准）";

  });

  animate();
}

// =========================
// 渲染
// =========================
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}

// =========================
// 姿态计算
// =========================
function getAngles(lm) {

  const nose = lm[0];
  const ls = lm[11];
  const rs = lm[12];

  const midY = (ls.y + rs.y) / 2;

  const pitch = (nose.y - midY) * 6;
  const roll  = (rs.y - ls.y) * 6;
  const yaw   = (0.5 - nose.x) * 6;

  return { pitch, yaw, roll };
}

// =========================
// 驱动模型
// =========================
function updateModel({pitch, yaw, roll}) {

  if (!model) return;

  const limit = 1.2;

  model.rotation.x = -Math.max(-limit, Math.min(limit, pitch));
  model.rotation.y = Math.max(-limit, Math.min(limit, yaw));
  model.rotation.z = Math.max(-limit, Math.min(limit, roll));

  if (Math.abs(pitch) > 0.6) {
    statusEl.innerText = "⚠ 低头过多";
  } else if (Math.abs(roll) > 0.6) {
    statusEl.innerText = "⚠ 身体歪斜";
  } else {
    statusEl.innerText = "✔ 姿势良好";
  }
}

// =========================
// MediaPipe
// =========================
function initPose() {

  const pose = new Pose({
    locateFile: f =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`
  });

  pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true
  });

  pose.onResults(res => {

    if (!res.poseLandmarks) return;

    const angles = getAngles(res.poseLandmarks);

    updateModel(angles);
  });

  loop();

  async function loop() {
    await pose.send({ image: video });
    requestAnimationFrame(loop);
  }
}

// =========================
// 启动
// =========================
(async () => {
  await startCamera();
  init3D();
  initPose();
})();

</script>

</body>
</html>
