<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>坐姿检测修复版</title>

<style>
body {
    margin: 0;
    background: #000;
    overflow: hidden;
    color: white;
    font-family: sans-serif;
}

#video {
    position: absolute;
    width: 240px;
    right: 10px;
    top: 10px;
    border-radius: 10px;
    border: 2px solid white;
    transform: scaleX(-1);
}

#canvas {
    position: absolute;
    top: 0;
    left: 0;
}

#warning {
    position: absolute;
    bottom: 40px;
    width: 100%;
    text-align: center;
    font-size: 30px;
    color: red;
    display: none;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="warning">⚠️ 坐姿不端正！请坐直</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>

const videoElement = document.getElementById("video");
const canvasElement = document.getElementById("canvas");
const ctx = canvasElement.getContext("2d");
const warning = document.getElementById("warning");

// ===== Pose 初始化 =====
const pose = new Pose({
    locateFile: (file) =>
        `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
});

pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true,
    minDetectionConfidence: 0.6,
    minTrackingConfidence: 0.6
});

function isBadPosture(lm){

    const nose = lm[0];
    const ls = lm[11];
    const rs = lm[12];
    const lh = lm[23];
    const rh = lm[24];

    const shoulderX = (ls.x + rs.x) / 2;

    const headForward = Math.abs(nose.x - shoulderX);

    const shoulderCenterY = (ls.y + rs.y)/2;
    const hipCenterY = (lh.y + rh.y)/2;

    const lean = shoulderCenterY - hipCenterY;

    return headForward > 0.08 || lean > 0.25;
}

pose.onResults(results => {

    canvasElement.width = videoElement.videoWidth;
    canvasElement.height = videoElement.videoHeight;

    ctx.clearRect(0,0,canvasElement.width,canvasElement.height);

    if(results.poseLandmarks){

        drawConnectors(ctx, results.poseLandmarks, Pose.POSE_CONNECTIONS);
        drawLandmarks(ctx, results.poseLandmarks);

        if(isBadPosture(results.poseLandmarks)){
            warning.style.display = "block";
        }else{
            warning.style.display = "none";
        }
    }
});

// ====== ⭐⭐⭐ 关键修复：用户点击触发摄像头 ======
async function startCamera(){

    const stream = await navigator.mediaDevices.getUserMedia({
        video: true,
        audio: false
    });

    videoElement.srcObject = stream;

    await videoElement.play();

    const camera = new Camera.Camera(videoElement, {
        onFrame: async () => {
            await pose.send({image: videoElement});
        },
        width: 640,
        height: 480
    });

    camera.start();
}

// ===== 自动点击启动（必须用户触发）=====
document.body.addEventListener("click", async () => {
    if(videoElement.srcObject) return;
    await startCamera();
});

</script>

</body>
</html>
