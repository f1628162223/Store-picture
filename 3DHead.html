<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>模型自动正面朝前</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #111;
  }

  #status {
    position: absolute;
    top: 20px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 18px;
  }
</style>
</head>

<body>

<div id="status">加载模型中...</div>

<script type="module">

import * as THREE from 'https://esm.sh/three@0.158.0';
import { GLTFLoader } from 'https://esm.sh/three@0.158.0/examples/jsm/loaders/GLTFLoader.js';

const statusEl = document.getElementById("status");

let scene, camera, renderer, model;

init();

function init() {

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    60,
    innerWidth / innerHeight,
    0.1,
    1000
  );

  camera.position.set(0, 0, 2);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);

  scene.add(new THREE.DirectionalLight(0xffffff, 1));
  scene.add(new THREE.AmbientLight(0xffffff, 0.6));

  const loader = new GLTFLoader();

  loader.load('./puppycat_head.glb', (gltf) => {

    const raw = gltf.scene;

    scene.add(raw);
    model = raw;

    // =========================
    // 1️⃣ 自动居中
    // =========================
    const box = new THREE.Box3().setFromObject(raw);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());

    raw.position.sub(center);
    raw.scale.setScalar(2 / size.length());

    // =========================
    // 2️⃣ ⭐ 自动找“正面朝向”
    // =========================
    const forwardTest = new THREE.Vector3(0, 0, -1); // Three.js 正前方

    const testBox = new THREE.Box3().setFromObject(raw);
    const centerWorld = testBox.getCenter(new THREE.Vector3());

    // 模型当前“朝向猜测”
    const directions = [
      new THREE.Vector3(1, 0, 0),
      new THREE.Vector3(-1, 0, 0),
      new THREE.Vector3(0, 0, 1),
      new THREE.Vector3(0, 0, -1),
    ];

    let bestDir = directions[0];
    let minAngle = Infinity;

    for (let dir of directions) {

      const angle = dir.angleTo(forwardTest);

      if (angle < minAngle) {
        minAngle = angle;
        bestDir = dir;
      }
    }

    // =========================
    // 3️⃣ 旋转到正脸
    // =========================
    const axisY = new THREE.Vector3(0, 1, 0);

    const angleFix = Math.atan2(bestDir.x, bestDir.z);

    raw.rotateOnAxis(axisY, angleFix);

    statusEl.innerText = "✔ 模型已自动对齐正面";

  });

  animate();
}

// =========================
// 渲染
// =========================
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}

// =========================
// 自适应
// =========================
window.addEventListener("resize", () => {

  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();

  renderer.setSize(innerWidth, innerHeight);
});

</script>

</body>
</html>
