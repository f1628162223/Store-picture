<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>坐姿检测</title>

<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
  }

  video {
    position: absolute;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    transform: scaleX(-1);
  }

  canvas {
    position: absolute;
    top: 0;
    left: 0;
  }

  #score {
    position: absolute;
    top: 5vh;
    width: 100%;
    text-align: center;
    font-size: 10vh;
    font-weight: 900;
    color: white;
  }

  #warning {
    position: absolute;
    bottom: 10vh;
    left: 50%;
    transform: translateX(-50%);
    font-size: 6vh;
    font-weight: 900;
    color: red;
    background: rgba(0,0,0,0.7);
    border: 3px solid red;
    border-radius: 12px;
    padding: 2vh 4vh;
    display: none;
  }
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="score">--</div>
<div id="warning"></div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");
const warningEl = document.getElementById("warning");

let pose;
let ready = false;
let badFrames = 0;

// ======================
// 摄像头（增强稳定）
// ======================
async function startCamera() {

  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user" },
    audio: false
  });

  video.srcObject = stream;

  await new Promise(resolve => {
    video.onloadedmetadata = () => resolve();
  });

  await video.play();
}

// ======================
// 镜像
// ======================
function mirror(lm) {
  return lm.map(p => ({
    ...p,
    x: 1 - p.x
  }));
}

// ======================
// 坐姿判断（稳定版）
// ======================
function analyze(lm) {

  const nose = lm[0];
  const ls = lm[11];
  const rs = lm[12];
  const lh = lm[23];
  const rh = lm[24];

  if (!nose || !ls || !rs || !lh || !rh) {
    return { score: 100, bad: false, msg: "" };
  }

  const shoulderX = (ls.x + rs.x) / 2;
  const shoulderY = (ls.y + rs.y) / 2;
  const hipY = (lh.y + rh.y) / 2;

  let score = 100;
  let reasons = [];

  const headDrop = nose.y - shoulderY;
  const bodyLean = Math.abs(nose.x - shoulderX);

  if (bodyLean > 0.14 && headDrop > 0.18) {
    score -= 45;
    reasons.push("身体前倾");
  }

  if (nose.y > hipY - 0.05) {
    score -= 50;
    reasons.push("趴桌");
  }

  return {
    score: Math.max(0, score),
    bad: score < 70,
    msg: reasons.join(" / ")
  };
}

// ======================
// 初始化 pose（延迟启动）
// ======================
function initPose() {

  pose = new Pose({
    locateFile: (file) =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
  });

  pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true,
    minDetectionConfidence: 0.4,
    minTrackingConfidence: 0.4
  });

  pose.onResults(onResults);

  loop();
}

// ======================
// 🔥 安全循环（防黑屏关键）
// ======================
async function loop() {

  if (!ready) {
    requestAnimationFrame(loop);
    return;
  }

  if (video.videoWidth === 0) {
    requestAnimationFrame(loop);
    return;
  }

  await pose.send({ image: video });

  requestAnimationFrame(loop);
}

// ======================
// 结果
// ======================
function onResults(results) {

  if (!results.poseLandmarks) return;

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const lm = mirror(results.poseLandmarks);

  drawConnectors(ctx, lm, Pose.POSE_CONNECTIONS);
  drawLandmarks(ctx, lm);

  const { score, bad, msg } = analyze(lm);

  scoreEl.innerText = score;

  if (bad) badFrames++;
  else badFrames = 0;

  if (badFrames > 6) {
    warningEl.style.display = "block";
    warningEl.innerText = "⚠ " + msg;
  } else {
    warningEl.style.display = "none";
  }
}

// ======================
// 启动流程（关键修复）
// ======================
async function start() {

  await startCamera();   // 先摄像头

  ready = true;          // 再允许 pose

  initPose();            // 再加载AI
}

start();

</script>

</body>
</html>
