<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pose Avatar System</title>

<style>
body { margin:0; overflow:hidden; background:#0a0f1e; }
#video {
    position:absolute;
    right:10px;
    top:10px;
    width:180px;
    border-radius:10px;
    border:2px solid white;
}
#info{
    position:absolute;
    left:10px;
    top:10px;
    color:white;
    font-family:monospace;
    font-size:13px;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="c"></canvas>
<div id="info"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>

// ================= SCENE =================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({
    canvas:document.getElementById("c"),
    antialias:true
});
renderer.setSize(innerWidth, innerHeight);

// light
scene.add(new THREE.AmbientLight(0xffffff, 1.3));
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,5,5);
scene.add(light);

// ================= BETTER CARTOON AVATAR =================
function createAvatar(){

    const g = new THREE.Group();

    // head
    const head = new THREE.Mesh(
        new THREE.SphereGeometry(0.9,32,32),
        new THREE.MeshPhongMaterial({color:0xffd1a0})
    );
    head.scale.set(1,1.1,0.9);
    g.add(head);

    // eyes
    const eyeMat = new THREE.MeshPhongMaterial({color:0xffffff});
    const pupilMat = new THREE.MeshPhongMaterial({color:0x000});

    const eyeGeo = new THREE.SphereGeometry(0.15,16,16);
    const pupilGeo = new THREE.SphereGeometry(0.07,16,16);

    let le = new THREE.Mesh(eyeGeo, eyeMat);
    le.position.set(-0.3,0.3,0.8);
    g.add(le);

    let re = le.clone();
    re.position.x = 0.3;
    g.add(re);

    let lp = new THREE.Mesh(pupilGeo, pupilMat);
    lp.position.set(-0.3,0.3,1.0);
    g.add(lp);

    let rp = lp.clone();
    rp.position.x = 0.3;
    g.add(rp);

    // body (shoulders added → 你要的关键点)
    const body = new THREE.Mesh(
        new THREE.CylinderGeometry(0.6,0.8,1.2,32),
        new THREE.MeshPhongMaterial({color:0x4a90e2})
    );
    body.position.y = -1.5;
    g.add(body);

    const shoulderL = new THREE.Mesh(
        new THREE.BoxGeometry(0.6,0.3,0.4),
        new THREE.MeshPhongMaterial({color:0x3a6fd8})
    );
    shoulderL.position.set(-0.8,-1.0,0);
    g.add(shoulderL);

    const shoulderR = shoulderL.clone();
    shoulderR.position.x = 0.8;
    g.add(shoulderR);

    return g;
}

const avatar = createAvatar();
scene.add(avatar);

// ⭐⭐⭐ FIX：正确朝向（解决背对问题）
avatar.rotation.y = Math.PI;

// ================= SMOOTH =================
let rot = {x:0,y:0};
const lerp = (a,b,t)=>a+(b-a)*t;

// ================= POSE (HEAD + SHOULDER) =================
const video = document.getElementById("video");

const pose = new Pose({
    locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`
});

pose.setOptions({
    modelComplexity:1,
    smoothLandmarks:true,
    enableSegmentation:false,
    minDetectionConfidence:0.6,
    minTrackingConfidence:0.6
});

// ================= ANALYSIS =================
pose.onResults(res=>{

    if(!res.poseLandmarks) return;

    const lm = res.poseLandmarks;

    const nose = lm[0];
    const lShoulder = lm[11];
    const rShoulder = lm[12];

    // ===== HEAD TILT =====
    const shoulderSlope = rShoulder.y - lShoulder.y;

    // yaw (turn)
    const yaw = (rShoulder.x - lShoulder.x) * 180;

    // pitch (lean forward/back)
    const neckForward = nose.y - (lShoulder.y + rShoulder.y)/2;

    rot.y = lerp(rot.y, yaw, 0.1);
    rot.x = lerp(rot.x, neckForward * 200, 0.1);

    // ================= APPLY =================
    avatar.rotation.y = Math.PI + rot.y * Math.PI/180;
    avatar.rotation.x = -rot.x * Math.PI/180;

    // ===== posture detection =====
    let posture = "OK";

    if(neckForward > 0.08){
        posture = "低头太多";
    }

    if(Math.abs(shoulderSlope) > 0.05){
        posture = "坐姿歪";
        avatar.rotation.z = shoulderSlope * 2;
    }else{
        avatar.rotation.z *= 0.9;
    }

    document.getElementById("info").innerHTML =
    `yaw:${rot.y.toFixed(1)}<br>
     pitch:${rot.x.toFixed(1)}<br>
     posture:${posture}`;
});

// ================= CAMERA =================
const videoEl = document.getElementById("video");

const cam = new Camera(videoEl,{
    onFrame: async ()=>{
        await pose.send({image:videoEl});
    },
    width:640,
    height:480
});

cam.start();

// ================= LOOP =================
function animate(){
    requestAnimationFrame(animate);
    renderer.render(scene,camera);
}
animate();

addEventListener("resize",()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
