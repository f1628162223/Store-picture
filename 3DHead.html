<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>坐姿评分系统</title>

<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: Arial;
    color: white;
  }

  video {
    position: absolute;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    transform: scaleX(-1);
  }

  canvas {
    position: absolute;
    top: 0;
    left: 0;
  }

  /* 分数 */
  #score {
    position: absolute;
    top: 5vh;
    width: 100%;
    text-align: center;
    font-size: 10vh;
    font-weight: 900;
    text-shadow: 0 0 10px black;
  }

  /* 原因提示 */
  #warning {
    position: absolute;
    bottom: 10vh;
    left: 50%;
    transform: translateX(-50%);

    font-size: 5vh;
    font-weight: 900;
    color: #ff3b3b;

    background: rgba(0,0,0,0.65);
    border: 3px solid #ff3b3b;
    border-radius: 14px;

    padding: 2vh 4vh;
    display: none;
    text-align: center;
  }
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="score">100</div>
<div id="warning"></div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");
const warningEl = document.getElementById("warning");

let pose;
let running = false;

// ======================
// 摄像头
// ======================
async function startCamera() {

  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user" },
    audio: false
  });

  video.srcObject = stream;

  return new Promise(resolve => {
    video.onloadedmetadata = () => {
      video.play();
      resolve();
    };
  });
}

// ======================
// 镜像修复
// ======================
function mirror(lm) {
  return lm.map(p => ({
    ...p,
    x: 1 - p.x
  }));
}

// ======================
// 评分 + 原因分析（关键升级）
// ======================
function analyzePosture(lm) {

  const nose = lm[0];
  const ls = lm[11];
  const rs = lm[12];
  const lh = lm[23];
  const rh = lm[24];

  if (!nose || !ls || !rs || !lh || !rh) {
    return { score: 100, reasons: [] };
  }

  const shoulderX = (ls.x + rs.x) / 2;
  const shoulderY = (ls.y + rs.y) / 2;
  const hipY = (lh.y + rh.y) / 2;

  let score = 100;
  let reasons = [];

  // 🔴 前倾
  if (Math.abs(nose.x - shoulderX) > 0.1) {
    score -= 30;
    reasons.push("头部前倾");
  }

  // 🔴 驼背
  if (nose.y > shoulderY + 0.12) {
    score -= 30;
    reasons.push("身体前弯（驼背）");
  }

  // 🔴 趴桌
  if (nose.y > hipY - 0.05) {
    score -= 40;
    reasons.push("距离桌面过近（趴桌）");
  }

  return {
    score: Math.max(0, score),
    reasons
  };
}

// ======================
// 初始化
// ======================
function initPose() {

  pose = new Pose({
    locateFile: (file) =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
  });

  pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5
  });

  pose.onResults(onResults);

  running = true;
  loop();
}

// ======================
// 循环
// ======================
async function loop() {
  if (!running) return;

  await pose.send({ image: video });

  setTimeout(loop, 33);
}

// ======================
// 结果处理
// ======================
function onResults(results) {

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!results.poseLandmarks) return;

  const lm = mirror(results.poseLandmarks);

  drawConnectors(ctx, lm, Pose.POSE_CONNECTIONS);
  drawLandmarks(ctx, lm);

  const { score, reasons } = analyzePosture(lm);

  // ======================
  // 1. 显示分数（修复你问题1）
  // ======================
  scoreEl.innerText = score;

  // ======================
  // 2. 显示原因（修复你问题2）
  // ======================
  if (score < 60 && reasons.length > 0) {
    warningEl.style.display = "block";
    warningEl.innerText = "⚠ " + reasons.join(" / ");
  } else {
    warningEl.style.display = "none";
  }
}

// ======================
// 启动
// ======================
async function start() {
  await startCamera();
  initPose();
}

start();

</script>

</body>
</html>
