<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>坐姿检测系统</title>

<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: Arial;
    color: white;
  }

  video {
    position: absolute;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    transform: scaleX(-1);
  }

  canvas {
    position: absolute;
    top: 0;
    left: 0;
  }

  #score {
    position: absolute;
    top: 5vh;
    width: 100%;
    text-align: center;
    font-size: 10vh;
    font-weight: 900;
  }

  #warning {
    position: absolute;
    bottom: 10vh;
    left: 50%;
    transform: translateX(-50%);

    font-size: 6vh;
    font-weight: 900;
    color: red;

    background: rgba(0,0,0,0.7);
    border: 3px solid red;
    border-radius: 12px;

    padding: 2vh 4vh;
    display: none;
  }
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="score">100</div>
<div id="warning"></div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");
const warningEl = document.getElementById("warning");

let pose;
let badFrames = 0; // 🔥 连续判断

// =====================
// 摄像头
// =====================
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user" },
    audio: false
  });

  video.srcObject = stream;

  return new Promise(resolve => {
    video.onloadedmetadata = () => {
      video.play();
      resolve();
    };
  });
}

// =====================
// 镜像
// =====================
function mirror(lm) {
  return lm.map(p => ({
    ...p,
    x: 1 - p.x
  }));
}

// =====================
// 🔥 高精度坐姿判断
// =====================
function analyze(lm) {

  const nose = lm[0];
  const ls = lm[11];
  const rs = lm[12];
  const lh = lm[23];
  const rh = lm[24];

  if (!nose || !ls || !rs || !lh || !rh) {
    return { score: 100, bad: false, msg: "" };
  }

  const shoulderX = (ls.x + rs.x) / 2;
  const shoulderY = (ls.y + rs.y) / 2;
  const hipY = (lh.y + rh.y) / 2;

  let score = 100;
  let reasons = [];

  // =====================
  // 🔴 1. 头前伸（更灵敏）
  // =====================
  const headForward = Math.abs(nose.x - shoulderX);
  if (headForward > 0.06) {
    score -= 35;
    reasons.push("头前倾");
  }

  // =====================
  // 🔴 2. 驼背（增强）
  // =====================
  const bodyLean = nose.y - shoulderY;
  if (bodyLean > 0.10) {
    score -= 35;
    reasons.push("驼背");
  }

  // =====================
  // 🔴 3. 趴桌（更敏感）
  // =====================
  if (nose.y > hipY - 0.08) {
    score -= 40;
    reasons.push("趴桌");
  }

  score = Math.max(0, score);

  return {
    score,
    bad: score < 70,
    msg: reasons.join(" / ")
  };
}

// =====================
// 初始化
// =====================
function initPose() {

  pose = new Pose({
    locateFile: (file) =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
  });

  pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true,
    minDetectionConfidence: 0.4,
    minTrackingConfidence: 0.4
  });

  pose.onResults(onResults);

  loop();
}

// =====================
// 循环
// =====================
async function loop() {
  await pose.send({ image: video });
  setTimeout(loop, 30);
}

// =====================
// 结果
// =====================
function onResults(results) {

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!results.poseLandmarks) return;

  const lm = mirror(results.poseLandmarks);

  drawConnectors(ctx, lm, Pose.POSE_CONNECTIONS);
  drawLandmarks(ctx, lm);

  const { score, bad, msg } = analyze(lm);

  // =====================
  // 分数
  // =====================
  scoreEl.innerText = score;

  // =====================
  // 🔥 连续3帧才报警（防误报）
  // =====================
  if (bad) {
    badFrames++;
  } else {
    badFrames = 0;
  }

  if (badFrames > 5) {
    warningEl.style.display = "block";
    warningEl.innerText = "⚠ " + msg;
  } else {
    warningEl.style.display = "none";
  }
}

// =====================
async function start() {
  await startCamera();
  initPose();
}

start();

</script>

</body>
</html>
