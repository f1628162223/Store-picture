<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>AI坐姿系统（稳定优化版）</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
  }

  video {
    position: absolute;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    transform: scaleX(1);
    opacity: 0;
  }

  /* ✅ 问题1：提示放大 */
  #status {
    position: absolute;
    bottom: 40px;
    width: 100%;
    text-align: center;
    color: red;
    font-size: 42px; /* 👈 放大 */
    font-weight: bold;
    z-index: 10;
    text-shadow: 0 0 10px black;
  }
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<div id="status">初始化中...</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>

<script type="module">

import * as THREE from 'https://esm.sh/three@0.158.0';
import { GLTFLoader } from 'https://esm.sh/three@0.158.0/examples/jsm/loaders/GLTFLoader.js';

const video = document.getElementById("video");
const statusEl = document.getElementById("status");

let scene, camera, renderer, model;
let pose;

let baseRotationY = 4.7;

// =========================
// ❗报警稳定器（解决问题3）
// =========================
let badFrameCount = 0;

// =========================
// 摄像头
// =========================
async function startCamera() {

  const stream = await navigator.mediaDevices.getUserMedia({
    video: true
  });

  video.srcObject = stream;

  await new Promise(r => video.onloadedmetadata = r);
  await video.play();
}

// =========================
// 3D
// =========================
function init3D() {

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    60,
    innerWidth / innerHeight,
    0.1,
    1000
  );

  camera.position.set(0, 0.15, 2.2);
  camera.lookAt(0, 0.15, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);

  scene.add(new THREE.DirectionalLight(0xffffff, 1));
  scene.add(new THREE.AmbientLight(0xffffff, 0.6));

  const loader = new GLTFLoader();

  loader.load('./puppycat_head.glb', (gltf) => {

    model = gltf.scene;
    scene.add(model);

    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());

    model.position.sub(center);
    model.position.y -= size.y * 0.35;

    model.scale.setScalar(2 / size.length());

    model.rotation.y = baseRotationY;
    model.rotation.x = -1;

    statusEl.innerText = "✔ 模型加载成功";
  });

  animate();
}

// =========================
// 渲染
// =========================
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}

// =========================
// 姿态（优化：减少上下灵敏度）
// =========================
function getAngles(lm) {

  const nose = lm[0];
  const ls = lm[11];
  const rs = lm[12];

  const midY = (ls.y + rs.y) / 2;

  return {
    // ✅ 问题2修复：弱化上下驱动
    pitch: -(nose.y - midY) * 3,  // 👈 从6降到3（关键）

    roll: (rs.y - ls.y) * 6,
    yaw: (nose.x - 0.5) * 6
  };
}

// =========================
// 模型更新 + 报警逻辑优化
// =========================
function updateModel({pitch, yaw, roll}) {

  if (!model) return;

  const limit = 1.0;

  // =========================
  // 模型运动（上下更柔和）
  // =========================
  model.rotation.x =
    -1 + Math.max(-limit, Math.min(limit, pitch));

  model.rotation.y =
    baseRotationY + Math.max(-limit, Math.min(limit, yaw));

  model.rotation.z =
    Math.max(-limit, Math.min(limit, roll));

  // =========================
  // ❗问题3：防抖报警（核心修复）
  // =========================
  const isBad = pitch > 0.6; // 低头

  if (isBad) {
    badFrameCount++;
  } else {
    badFrameCount = 0;
  }

  // 连续超过 10 帧才报警
  if (badFrameCount > 10) {
    statusEl.innerText = "⚠ 低头过多";
  } else {
    statusEl.innerText = "✔ 姿势良好";
  }
}

// =========================
// MediaPipe
// =========================
function initPose() {

  const pose = new Pose({
    locateFile: f =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`
  });

  pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true
  });

  pose.onResults(res => {
    if (!res.poseLandmarks) return;
    updateModel(getAngles(res.poseLandmarks));
  });

  loop();

  async function loop() {
    await pose.send({ image: video });
    requestAnimationFrame(loop);
  }
}

// =========================
// 启动
// =========================
(async () => {
  await startCamera();
  init3D();
  initPose();
})();

</script>

</body>
</html>
