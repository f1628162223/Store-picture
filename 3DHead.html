<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>坐姿检测</title>

<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: Arial;
  }

  video {
    position: absolute;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    transform: scaleX(-1);
  }

  canvas {
    position: absolute;
    top: 0;
    left: 0;
  }

  #score {
    position: absolute;
    top: 5vh;
    width: 100%;
    text-align: center;
    font-size: 10vh;
    color: white;
  }

  #warning {
    position: absolute;
    bottom: 10vh;
    left: 50%;
    transform: translateX(-50%);
    font-size: 5vh;
    color: red;
    background: rgba(0,0,0,0.7);
    padding: 20px;
    border-radius: 10px;
    display: none;
  }

  #btn {
    position: absolute;
    top: 20vh;
    left: 50%;
    transform: translateX(-50%);
    font-size: 4vh;
    padding: 10px 30px;
  }
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="score">--</div>
<div id="warning"></div>
<button id="btn">点击校准（坐直）</button>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");
const warningEl = document.getElementById("warning");
const btn = document.getElementById("btn");

let pose;
let base = null;
let lastLm = null;
let badFrames = 0;

// ======================
// 摄像头
// ======================
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;
  await new Promise(r => video.onloadedmetadata = r);
  await video.play();
}

// ======================
// 镜像
// ======================
function mirror(lm) {
  return lm.map(p => ({ ...p, x: 1 - p.x }));
}

// ======================
// ⭐ 校准
// ======================
btn.onclick = () => {
  if (!lastLm) return;
  base = JSON.parse(JSON.stringify(lastLm));
  btn.style.display = "none";
};

// ======================
// ⭐ 分析（已修复）
// ======================
function analyze(lm) {

  if (!base) {
    scoreEl.innerText = "请先校准";
    return;
  }

  const nose = lm[0];
  const baseNose = base[0];

  const ls = lm[11];
  const baseLs = base[11];

  const rs = lm[12];
  const baseRs = base[12];

  let score = 100;
  let reasons = [];

  // =====================
  // 🔥 1. 前倾（相对判断）
  // =====================
  const forward = Math.abs(nose.x - baseNose.x);

  if (forward > 0.05) {
    score -= 40;
    reasons.push("身体前倾");
  }

  // =====================
  // 🔥 2. 驼背（关键修复）
  // 用“肩膀高度变化”判断
  // =====================
  const shoulderNow = (ls.y + rs.y) / 2;
  const shoulderBase = (baseLs.y + baseRs.y) / 2;

  const backBend = shoulderNow - shoulderBase;

  if (backBend > 0.04) {
    score -= 35;
    reasons.push("驼背");
  }

  // =====================
  // 🔥 3. 低头（相对判断）
  // =====================
  const headDown = nose.y - baseNose.y;

  if (headDown > 0.06) {
    score -= 25;
    reasons.push("低头过多");
  }

  score = Math.max(0, score);

  scoreEl.innerText = score;

  // =====================
  // 稳定报警
  // =====================
  if (score < 75) badFrames++;
  else badFrames = 0;

  if (badFrames > 3) {
    warningEl.style.display = "block";
    warningEl.innerText = "⚠ " + reasons.join(" / ");
  } else {
    warningEl.style.display = "none";
  }
}

// ======================
// 初始化
// ======================
function initPose() {

  pose = new Pose({
    locateFile: file =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
  });

  pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true
  });

  pose.onResults(res => {

    if (!res.poseLandmarks) return;

    const lm = mirror(res.poseLandmarks);
    lastLm = lm;

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawConnectors(ctx, lm, Pose.POSE_CONNECTIONS);
    drawLandmarks(ctx, lm);

    analyze(lm);
  });

  loop();
}

async function loop() {
  await pose.send({ image: video });
  requestAnimationFrame(loop);
}

// ======================
// 启动
// ======================
(async () => {
  await startCamera();
  initPose();
})();

</script>

</body>
</html>
