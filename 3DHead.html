<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>AI坐姿 + 正确视角修复版</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
  }

  video {
    position: absolute;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    transform: scaleX(1);
    opacity: 0;
  }

  #status {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 18px;
    z-index: 10;
  }
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<div id="status">初始化中...</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>

<script type="module">

import * as THREE from 'https://esm.sh/three@0.158.0';
import { GLTFLoader } from 'https://esm.sh/three@0.158.0/examples/jsm/loaders/GLTFLoader.js';

const video = document.getElementById("video");
const statusEl = document.getElementById("status");

let scene, camera, renderer;
let model;
let pose;

let baseRotationY = 4.7;

// =========================
// 摄像头
// =========================
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;
  await new Promise(r => video.onloadedmetadata = r);
  await video.play();
}

// =========================
// 3D初始化（关键修复点都在这里）
// =========================
function init3D() {

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  // ⭐ 修复1：避免俯视
  camera.position.set(0, 0.05, 2.2);

  // ⭐ 修复2：对准“脸高度”，不是模型中心
  camera.lookAt(0, 0.1, 0);

  renderer = new THREE.WebGLRenderer({
    antialias: true,
    alpha: true
  });

  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // 光照
  scene.add(new THREE.DirectionalLight(0xffffff, 1));
  scene.add(new THREE.AmbientLight(0xffffff, 0.6));

  const loader = new GLTFLoader();

  loader.load('./puppycat_head.glb', (gltf) => {

    model = gltf.scene;
    scene.add(model);

    // =========================
    // ⭐ 关键修复：脸部对齐
    // =========================
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());

    // 1️⃣ 居中
    model.position.sub(center);

    // 2️⃣ ⭐关键：把“脸”从头顶拉下来
    model.position.y -= size.y * 0.28;

    // 缩放
    model.scale.setScalar(2 / size.length());

    // ⭐ 初始角度
    model.rotation.y = baseRotationY;

    statusEl.innerText = "✔ 模型加载成功（已修复视角）";
  });

  animate();
}

// =========================
// 渲染
// =========================
function animate() {
  requestAnimationFrame(animate);

  // ⭐ 强制对准脸区域
  camera.lookAt(0, 0.1, 0);

  renderer.render(scene, camera);
}

// =========================
// 姿态计算
// =========================
function getAngles(lm) {

  const nose = lm[0];
  const ls = lm[11];
  const rs = lm[12];

  const midY = (ls.y + rs.y) / 2;

  return {
    pitch: (nose.y - midY) * 6,
    roll: (rs.y - ls.y) * 6,
    yaw: (nose.x - 0.5) * 6
  };
}

// =========================
// 更新模型
// =========================
function updateModel({pitch, yaw, roll}) {

  if (!model) return;

  const limit = 1.2;

  model.rotation.x = -Math.max(-limit, Math.min(limit, pitch));
  model.rotation.y = baseRotationY + Math.max(-limit, Math.min(limit, yaw));
  model.rotation.z = Math.max(-limit, Math.min(limit, roll));

  if (Math.abs(pitch) > 0.6) {
    statusEl.innerText = "⚠ 低头过多";
  } else if (Math.abs(roll) > 0.6) {
    statusEl.innerText = "⚠ 身体歪斜";
  } else {
    statusEl.innerText = "✔ 姿势良好";
  }
}

// =========================
// MediaPipe
// =========================
function initPose() {

  pose = new Pose({
    locateFile: f =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`
  });

  pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true
  });

  pose.onResults(res => {

    if (!res.poseLandmarks) return;

    updateModel(getAngles(res.poseLandmarks));
  });

  loop();

  async function loop() {
    await pose.send({ image: video });
    requestAnimationFrame(loop);
  }
}

// =========================
// 启动
// =========================
(async () => {
  await startCamera();
  init3D();
  initPose();
})();

</script>

</body>
</html>
