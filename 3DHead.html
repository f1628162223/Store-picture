<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>3D坐姿检测系统</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
  }

  /* ✔ 不显示人脸 */
  video {
    position: absolute;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    transform: scaleX(-1);
    opacity: 0;
  }

  #status {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 20px;
    z-index: 10;
  }
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<div id="status">初始化中...</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>

<!-- Three.js -->
<script type="module">

import * as THREE from 'https://esm.sh/three@0.158.0';
import { GLTFLoader } from 'https://esm.sh/three@0.158.0/examples/jsm/loaders/GLTFLoader.js';

// =====================
// DOM
// =====================
const video = document.getElementById("video");
const statusEl = document.getElementById("status");

// =====================
// 全局变量
// =====================
let scene, camera, renderer, model;
let pose;

// =====================
// 摄像头（隐藏）
// =====================
async function startCamera() {

  const stream = await navigator.mediaDevices.getUserMedia({
    video: true
  });

  video.srcObject = stream;

  await new Promise(r => video.onloadedmetadata = r);
  await video.play();
}

// =====================
// 3D初始化
// =====================
function init3D() {

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  camera.position.set(0, 0, 2);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // 光
  scene.add(new THREE.DirectionalLight(0xffffff, 1));
  scene.add(new THREE.AmbientLight(0xffffff, 0.6));

  // =====================
  // 加载模型
  // =====================
  const loader = new GLTFLoader();

  loader.load('./puppycat_head.glb', (gltf) => {

    model = gltf.scene;
    scene.add(model);

    // =====================
    // ✔ 自动居中 + 缩放
    // =====================
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3()).length();
    const center = box.getCenter(new THREE.Vector3());

    model.position.sub(center);

    const scale = 2 / size;
    model.scale.setScalar(scale);

    // =====================
    // ⭐ 关键：修正模型朝向
    // （解决你“朝右”的问题）
    // =====================
    model.rotation.y = Math.PI;

    statusEl.innerText = "✔ 模型加载完成";

  }, undefined, (err) => {
    console.error(err);
    statusEl.innerText = "❌ 加载失败";
  });

  animate();
}

// =====================
// 渲染
// =====================
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}

// =====================
// 姿态计算
// =====================
function amplify(x) {
  return Math.sign(x) * Math.pow(Math.abs(x), 1.5);
}

function getAngles(lm) {

  const nose = lm[0];
  const ls = lm[11];
  const rs = lm[12];

  const midY = (ls.y + rs.y) / 2;

  let pitch = amplify(nose.y - midY) * 6;
  let roll  = amplify(rs.y - ls.y) * 6;
  let yaw   = amplify(0.5 - nose.x) * 6;

  if (Math.abs(pitch) < 0.02) pitch = 0;
  if (Math.abs(roll) < 0.02) roll = 0;
  if (Math.abs(yaw) < 0.02) yaw = 0;

  return { pitch, yaw, roll };
}

// =====================
// 驱动模型
// =====================
function updateModel({pitch, yaw, roll}) {

  if (!model) return;

  const limit = 1.2;

  pitch = Math.max(-limit, Math.min(limit, pitch));
  yaw   = Math.max(-limit, Math.min(limit, yaw));
  roll  = Math.max(-limit, Math.min(limit, roll));

  // ✔ 关键映射
  model.rotation.x = -pitch;
  model.rotation.y = yaw;
  model.rotation.z = roll;

  // ✔ 状态提示
  if (Math.abs(pitch) > 0.6) {
    statusEl.innerText = "⚠ 低头过多";
  } else if (Math.abs(roll) > 0.6) {
    statusEl.innerText = "⚠ 身体歪斜";
  } else {
    statusEl.innerText = "✔ 姿势良好";
  }
}

// =====================
// MediaPipe
// =====================
function initPose() {

  pose = new Pose({
    locateFile: f =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`
  });

  pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true
  });

  pose.onResults(res => {

    if (!res.poseLandmarks) return;

    const angles = getAngles(res.poseLandmarks);

    updateModel(angles);
  });

  loop();
}

async function loop() {
  await pose.send({ image: video });
  requestAnimationFrame(loop);
}

// =====================
// 启动
// =====================
(async () => {

  await startCamera();
  init3D();
  initPose();

})();

</script>

</body>
</html>
