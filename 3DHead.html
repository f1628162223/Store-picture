<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>AI坐姿 + 3D反馈系统</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
  }

  video {
    position: absolute;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    transform: scaleX(-1);
    opacity: 0; /* ✔ 不显示人脸（关键） */
  }

  #status {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 20px;
    z-index: 10;
  }
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<div id="status">初始化中...</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>

<!-- Three.js (ESM方式) -->
<script type="module">

import * as THREE from 'https://esm.sh/three@0.158.0';
import { GLTFLoader } from 'https://esm.sh/three@0.158.0/examples/jsm/loaders/GLTFLoader.js';

// =====================
// DOM
// =====================
const video = document.getElementById("video");
const statusEl = document.getElementById("status");

// =====================
// 全局变量
// =====================
let scene, camera, renderer, model;
let pose;

// =====================
// 1️⃣ 摄像头（只用于识别，不显示）
// =====================
async function startCamera() {

  const stream = await navigator.mediaDevices.getUserMedia({
    video: true
  });

  video.srcObject = stream;

  await new Promise(r => video.onloadedmetadata = r);
  await video.play();
}

// =====================
// 2️⃣ Three.js 初始化（来自B）
// =====================
function init3D() {

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  camera.position.set(0, 0, 2);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // 光照
  const light1 = new THREE.DirectionalLight(0xffffff, 1);
  light1.position.set(1, 1, 1);
  scene.add(light1);

  const light2 = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
  scene.add(light2);

  // 模型加载
  const loader = new GLTFLoader();

  loader.load(
    './puppycat_head.glb',

    (gltf) => {

      model = gltf.scene;
      scene.add(model);

      // ===== 自动居中 + 缩放（B的核心）=====
      const box = new THREE.Box3().setFromObject(model);
      const size = box.getSize(new THREE.Vector3()).length();
      const center = box.getCenter(new THREE.Vector3());

      model.position.sub(center);

      const scale = 2 / size;
      model.scale.setScalar(scale);

      statusEl.innerText = "✔ 模型加载成功";
    },

    undefined,

    (err) => {
      console.error(err);
      statusEl.innerText = "❌ 模型加载失败";
    }
  );

  animate();
}

// =====================
// 渲染循环
// =====================
function animate() {

  requestAnimationFrame(animate);

  // ✔ 模型固定，不自动转
  renderer.render(scene, camera);
}

// =====================
// 3️⃣ 姿态计算（来自A）
// =====================
function amplify(x) {
  return Math.sign(x) * Math.pow(Math.abs(x), 1.5);
}

function getAngles(lm) {

  const nose = lm[0];
  const ls = lm[11];
  const rs = lm[12];

  const midY = (ls.y + rs.y) / 2;

  let pitch = amplify(nose.y - midY) * 6;
  let roll  = amplify(rs.y - ls.y) * 6;
  let yaw   = amplify(0.5 - nose.x) * 6;

  if (Math.abs(pitch) < 0.02) pitch = 0;
  if (Math.abs(roll) < 0.02) roll = 0;
  if (Math.abs(yaw) < 0.02) yaw = 0;

  return { pitch, roll, yaw };
}

// =====================
// 4️⃣ 驱动3D模型（核心融合）
// =====================
function updateModel({pitch, yaw, roll}) {

  if (!model) return;

  const limit = 1.2;

  pitch = Math.max(-limit, Math.min(limit, pitch));
  yaw   = Math.max(-limit, Math.min(limit, yaw));
  roll  = Math.max(-limit, Math.min(limit, roll));

  // ✔ 动作映射
  model.rotation.x = -pitch;
  model.rotation.y = yaw;
  model.rotation.z = roll;

  // ✔ 状态反馈
  if (Math.abs(pitch) > 0.6) {
    statusEl.innerText = "⚠ 低头过多";
  } else if (Math.abs(roll) > 0.6) {
    statusEl.innerText = "⚠ 身体歪斜";
  } else {
    statusEl.innerText = "✔ 姿势良好";
  }
}

// =====================
// 5️⃣ MediaPipe 初始化（A）
// =====================
function initPose() {

  pose = new Pose({
    locateFile: f =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`
  });

  pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true
  });

  pose.onResults(res => {

    if (!res.poseLandmarks) return;

    const angles = getAngles(res.poseLandmarks);

    updateModel(angles);
  });

  loop();
}

async function loop() {
  await pose.send({ image: video });
  requestAnimationFrame(loop);
}

// =====================
// 启动
// =====================
(async () => {

  await startCamera();  // ✔ 摄像头（隐藏）
  init3D();             // ✔ 模型展示（B）
  initPose();           // ✔ 姿态识别（A）

})();

</script>

</body>
</html>
