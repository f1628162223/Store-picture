<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>3D坐姿驱动系统</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
  }

  video {
    position: absolute;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    transform: scaleX(1);
    opacity: 0;
  }

  #status {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 18px;
  }
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<div id="status">初始化中...</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>

<script type="module">

import * as THREE from 'https://esm.sh/three@0.158.0';
import { GLTFLoader } from 'https://esm.sh/three@0.158.0/examples/jsm/loaders/GLTFLoader.js';

const video = document.getElementById("video");
const statusEl = document.getElementById("status");

let scene, camera, renderer, model;
let pose;

// ⭐ 基准角度
let baseRotationY = 4.7;

// =========================
// 摄像头
// =========================
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;
  await new Promise(r => video.onloadedmetadata = r);
  await video.play();
}

// =========================
// 3D初始化
// =========================
function init3D() {

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  camera.position.set(0, 0.15, 2.2);
  camera.lookAt(0, 0.15, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  scene.add(new THREE.DirectionalLight(0xffffff, 1));
  scene.add(new THREE.AmbientLight(0xffffff, 0.6));

  const loader = new GLTFLoader();

  loader.load('./puppycat_head.glb', (gltf) => {

    model = gltf.scene;
    scene.add(model);

    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());

    model.position.sub(center);
    model.position.y -= size.y * 0.35;

    model.scale.setScalar(2 / size.length());

    // ⭐ 初始角度
    model.rotation.y = baseRotationY;

    statusEl.innerText = "✔ 模型加载成功";
  });

  animate();
}

// =========================
// 渲染循环
// =========================
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}

// =========================
// ⭐ 姿态计算（核心）
// =========================
function getAngles(lm) {

  const nose = lm[0];
  const ls = lm[11];
  const rs = lm[12];

  const midY = (ls.y + rs.y) / 2;

  return {
    pitch: (nose.y - midY) * 6,
    roll: (rs.y - ls.y) * 6,
    yaw: (nose.x - 0.5) * 6
  };
}

// =========================
// ⭐ 更新模型（关键）
// =========================
function updateModel({pitch, yaw, roll}) {

  if (!model) return;

  const limit = 1.2;

  model.rotation.x = -Math.max(-limit, Math.min(limit, pitch));
  model.rotation.y = baseRotationY + Math.max(-limit, Math.min(limit, yaw));
  model.rotation.z = Math.max(-limit, Math.min(limit, roll));

  if (Math.abs(pitch) > 0.6) {
    statusEl.innerText = "⚠ 低头过多";
  } else if (Math.abs(roll) > 0.6) {
    statusEl.innerText = "⚠ 身体歪斜";
  } else {
    statusEl.innerText = "✔ 姿势良好";
  }
}

// =========================
// ⭐ MediaPipe（你缺的就是这个）
// =========================
function initPose() {

  pose = new Pose({
    locateFile: f =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`
  });

  pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true
  });

  pose.onResults(res => {

    if (!res.poseLandmarks) return;

    const angles = getAngles(res.poseLandmarks);

    updateModel(angles); // ⭐ 关键：驱动模型
  });

  loop();

  async function loop() {
    await pose.send({ image: video });
    requestAnimationFrame(loop);
  }
}

// =========================
// 启动
// =========================
(async () => {
  await startCamera();
  init3D();
  initPose();
})();

</script>

</body>
</html>
